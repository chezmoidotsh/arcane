---
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Policy
metadata:
  name: lungmen.akn-mutualized-cnpg-databases
spec:
  forProvider:
    name: lungmen.akn-mutualized-cnpg-databases
    policy: "# Lungmen Mutualized CNPG Databases ESO Policy\n# \n# This policy grants
      permissions for the External Secrets Operator (ESO) to manage secrets related
      to shared databases,\n# required to allow ESO to push secrets generated from
      the Helm Chart `mutualized-cnpg-databases` to Vault.\n\n# Allows ESO to update
      databases secrets using PushSecrets.\npath \"lungmen.akn/data/+/database/*\"
      { capabilities = [\"create\", \"read\", \"update\", \"delete\"] }      \npath
      \"lungmen.akn/metadata/+/database/*\" { capabilities = [\"create\", \"read\",
      \"update\", \"delete\"] }\n"

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/part-of: cert-manager
  name: letsencrypt-issuer-credentials
  namespace: cert-manager-system
spec:
  data:
  - remoteRef:
      key: shared/third-parties/cloudflare/iam/lungmen.akn/cert-manager-rw
      property: api_token
    secretKey: api-token
  - remoteRef:
      key: shared/certificates/certificate-authorities/letsencrypt/account
      property: email
    secretKey: email
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: letsencrypt-issuer-credentials

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: newt
  name: newt-credentials
  namespace: newt-system
spec:
  data:
    - remoteRef:
        key: shared/third-parties/pangolin/newt/lungmen.akn
        property: endpoint
      secretKey: endpoint
    - remoteRef:
        key: shared/third-parties/pangolin/newt/lungmen.akn
        property: token_id
      secretKey: token_id
    - remoteRef:
        key: shared/third-parties/pangolin/newt/lungmen.akn
        property: token_secret
      secretKey: token_secret
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: newt-credentials
    template:
      data:
        NEWT_ID: "{{ .token_id }}"
        NEWT_SECRET: "{{ .token_secret }}"
        PANGOLIN_ENDPOINT: "{{ .endpoint }}"
      engineVersion: v2

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Newt to access Jellyfin service.
  labels:
    app.kubernetes.io/name: newt
  name: allow-newt-to-jellyfin
  namespace: newt-system
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/name: jellyfin
        io.kubernetes.pod.namespace: jellyfin
    toPorts:
    - ports:
      - port: "8096"
        protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: newt

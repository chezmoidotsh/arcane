---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Newt to access n8n service.
  labels:
    app.kubernetes.io/name: newt
  name: allow-newt-to-n8n
  namespace: newt-system
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/name: n8n
        io.kubernetes.pod.namespace: n8n
    toPorts:
    - ports:
      - port: "5678"
        protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: newt

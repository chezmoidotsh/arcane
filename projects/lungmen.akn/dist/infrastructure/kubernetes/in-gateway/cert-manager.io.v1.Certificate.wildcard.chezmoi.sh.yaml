---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard.chezmoi.sh
  namespace: in-gateway-system
spec:
  dnsNames:
  - '*.chezmoi.sh'
  - '*.akn.chezmoi.sh'
  - '*.lungmen.akn.chezmoi.sh'
  duration: 2160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  renewBefore: 360h
  secretName: wildcard.chezmoi.sh-certificate

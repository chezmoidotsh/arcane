---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: 6h-snapshots
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 */6 * * *
  groups:
  - auto-snapshots
  labels:
    snapshot.longhorn.io/interval: 6h
    snapshot.longhorn.io/type: auto
  name: 6h-snapshots
  retain: 4
  task: snapshot

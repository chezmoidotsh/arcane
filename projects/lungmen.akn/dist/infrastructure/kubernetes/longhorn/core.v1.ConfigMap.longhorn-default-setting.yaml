apiVersion: v1
data:
  default-setting.yaml: |-
    default-data-path: "/var/mnt/longhorn"
    storage-reserved-percentage-for-default-disk: "0"
    default-replica-count: "1"
    priority-class: "longhorn-critical"
    disable-revision-counter: "{\"v1\":\"true\"}"
    remove-snapshots-during-filesystem-trim: true
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/version: v1.11.2
    helm.sh/chart: longhorn-1.11.2
  name: longhorn-default-setting
  namespace: longhorn-system

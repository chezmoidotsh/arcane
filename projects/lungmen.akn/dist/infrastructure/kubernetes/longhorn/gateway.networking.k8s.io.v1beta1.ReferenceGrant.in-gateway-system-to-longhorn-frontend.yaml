---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Cilium Gateway from the in-gateway-system namespace to access the longhorn-frontend service.
      Longhorn is a critical storage management interface that requires secure cross-namespace access.
  name: in-gateway-system-to-longhorn-frontend
  namespace: longhorn-system
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: in-gateway-system
  to:
  - group: ""
    kind: Service
    name: longhorn-frontend

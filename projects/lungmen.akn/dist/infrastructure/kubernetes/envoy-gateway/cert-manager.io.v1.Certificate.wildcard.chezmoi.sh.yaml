---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/part-of: envoy-gateway
  name: wildcard.chezmoi.sh
  namespace: envoy-gateway-system
spec:
  dnsNames:
    - "*.chezmoi.sh"
    - "*.akn.chezmoi.sh"
    - "*.lungmen.akn.chezmoi.sh"
  duration: 2160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  renewBefore: 360h
  secretName: wildcard.chezmoi.sh-certificate

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: default
  namespace: envoy-gateway-system
spec:
  provider:
    kubernetes:
      envoyService:
        annotations:
          lbipam.cilium.io/sharing-cross-namespace: "*"
          lbipam.cilium.io/sharing-key: lungmen-gateway
        externalTrafficPolicy: Cluster
        type: LoadBalancer
    type: Kubernetes

---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  labels:
    app.kubernetes.io/instance: silverbullet
    app.kubernetes.io/name: silverbullet
  name: silverbullet-smb-storage
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 5Gi
  csi:
    driver: smb.csi.k8s.io
    nodeStageSecretRef:
      name: silverbullet-smb-credentials
      namespace: silverbullet
    volumeAttributes:
      source: //nas.chezmoi.sh/application-silverbullet
    volumeHandle: smb-server.default.svc.cluster.local/silverbullet##
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - uid=25705
    - gid=25705
    - noperm
    - mfsymlinks
    - cache=strict
    - noserverino
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: silverbullet
    app.kubernetes.io/name: silverbullet
  name: silverbullet-smb-credentials
  namespace: silverbullet
spec:
  data:
  - remoteRef:
      key: lungmen.akn/silverbullet/storage/smb
      property: username
    secretKey: username
  - remoteRef:
      key: lungmen.akn/silverbullet/storage/smb
      property: password
    secretKey: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: silverbullet-smb-credentials

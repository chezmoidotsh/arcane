apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Tailscale Ingress to route traffic to Silverbullet application
      for secure VPN-only access via MagicDNS endpoint.
  labels:
    app.kubernetes.io/instance: silverbullet
    app.kubernetes.io/name: silverbullet
  name: allow-silverbullet-from-tailscale
  namespace: silverbullet
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: silverbullet
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: tailscale-system
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: silverbullet
    app.kubernetes.io/name: silverbullet
  name: silverbullet-smb-storage
  namespace: silverbullet
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: smb
  volumeName: silverbullet-smb-storage

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: actual-budget
    app.kubernetes.io/name: actual-budget
  name: actual-budget-configuration
  namespace: actual-budget
spec:
  dataFrom:
    - extract:
        key: lungmen.akn/actual-budget/auth/oidc-client
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: actual-budget-configuration
    template:
      data:
        config.json: |
          {
            "openId": {
              "authMethod": "openid",
              "client_id": "{{ .client_id }}",
              "client_secret": "{{ .client_secret }}",
              "discoveryURL": "{{ .issuer_url }}/.well-known/openid-configuration",
              "server_hostname": "https://budget.chezmoi.sh"
            }
          }
      engineVersion: v2
      type: Opaque

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Paperless-ngx to access the secured mutualized PostgreSQL database.
  labels:
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/name: paperless-ngx
  name: allow-paperless-ngx-to-databases
  namespace: paperless-ngx
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        cnpg.io/cluster: apps-secured-20260329
        io.kubernetes.pod.namespace: databases
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: webserver

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: paperless-ngx
    app.kubernetes.io/name: paperless-ngx
  name: paperless-ngx-smb-credentials
  namespace: paperless-ngx
spec:
  data:
    - remoteRef:
        key: lungmen.akn/paperless-ngx/storage/smb
        property: username
      secretKey: username
    - remoteRef:
        key: lungmen.akn/paperless-ngx/storage/smb
        property: password
      secretKey: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: paperless-ngx-smb-credentials

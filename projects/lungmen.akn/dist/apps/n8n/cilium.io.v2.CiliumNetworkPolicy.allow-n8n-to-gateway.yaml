---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows n8n to access Cilium Gateway for routing traffic to services
      exposed via the Gateway in the same cluster.
  name: allow-n8n-to-gateway
  namespace: n8n
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: in-gateway-system
    toPorts:
    - ports:
      - port: "10080"
        protocol: TCP
      - port: "10443"
        protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: n8n

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: worker
    app.kubernetes.io/instance: n8n-worker
    app.kubernetes.io/name: n8n
  name: n8n-worker
  namespace: n8n
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/instance: n8n-worker
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/instance: n8n-worker
        app.kubernetes.io/name: n8n
    spec:
      automountServiceAccountToken: false
      containers:
        - args:
            - --concurrency=10
          command:
            - n8n
            - worker
          env:
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: n8n-database-n8n
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: n8n-database-n8n
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  key: encryption-key
                  name: n8n-encryption-key
          envFrom:
            - configMapRef:
                name: n8n-common
          image: ghcr.io/n8n-io/n8n:2.22.3@sha256:75d18a9ecc588c32ece70d87bfd3319004601cf1d0d4fea5f4ba3640acb87f7b
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          name: n8n-worker
          ports:
            - containerPort: 5678
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 25678
            runAsNonRoot: true
            runAsUser: 25678
          volumeMounts:
            - mountPath: /home/node/.cache
              name: cache
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/node/.n8n
              name: n8n-data
      securityContext:
        fsGroup: 25678
        runAsGroup: 25678
        runAsNonRoot: true
        runAsUser: 25678
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - emptyDir: {}
          name: cache
        - emptyDir: {}
          name: tmp
        - emptyDir: {}
          name: n8n-data

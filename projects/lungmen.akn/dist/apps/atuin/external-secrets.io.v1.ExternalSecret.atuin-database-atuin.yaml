---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: atuin
    app.kubernetes.io/name: atuin
  name: atuin-database-atuin
  namespace: atuin
spec:
  dataFrom:
  - extract:
      key: lungmen.akn/atuin/database/postgresql
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: atuin-database-atuin

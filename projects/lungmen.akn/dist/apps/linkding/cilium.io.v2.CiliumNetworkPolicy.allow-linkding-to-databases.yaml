---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Linkding to access the mutualized PostgreSQL database.
  labels:
    app.kubernetes.io/instance: linkding
    app.kubernetes.io/name: linkding
  name: allow-linkding-to-databases
  namespace: linkding
spec:
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: apps-20260329
            io.kubernetes.pod.namespace: databases
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: linkding

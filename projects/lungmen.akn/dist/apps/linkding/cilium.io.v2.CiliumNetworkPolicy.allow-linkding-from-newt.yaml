---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Newt to route traffic to Linkding application.
  labels:
    app.kubernetes.io/instance: linkding
    app.kubernetes.io/name: linkding
  name: allow-linkding-from-newt
  namespace: linkding
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: linkding
  ingress:
  - fromEndpoints:
    - matchLabels:
        app.kubernetes.io/name: newt
        io.kubernetes.pod.namespace: newt-system
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP

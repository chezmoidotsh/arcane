---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: linkding
    app.kubernetes.io/name: linkding
  name: linkding-database-linkding
  namespace: linkding
spec:
  dataFrom:
    - extract:
        key: lungmen.akn/linkding/database/postgresql
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: linkding-database-linkding

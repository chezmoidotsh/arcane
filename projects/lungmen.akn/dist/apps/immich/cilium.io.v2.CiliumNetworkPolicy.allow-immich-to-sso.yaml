apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Immich to access SSO for authentication. Permits outbound HTTPS connections to auth.chezmoi.sh on port 443.
  labels:
    app.kubernetes.io/instance: immich
    app.kubernetes.io/name: immich
  name: allow-immich-to-sso
  namespace: immich
spec:
  egress:
    - toFQDNs:
        - matchName: auth.chezmoi.sh
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
          serverNames:
            - auth.chezmoi.sh
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich

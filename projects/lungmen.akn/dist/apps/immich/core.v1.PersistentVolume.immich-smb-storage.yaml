---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  labels:
    app.kubernetes.io/instance: immich
    app.kubernetes.io/name: immich
  name: immich-smb-storage
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 50Gi
  csi:
    driver: smb.csi.k8s.io
    nodeStageSecretRef:
      name: immich-smb-credentials
      namespace: immich
    volumeAttributes:
      source: //nas.chezmoi.sh/application-immich
    volumeHandle: smb-server.default.svc.cluster.local/immich##
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - uid=31847
    - gid=31847
    - noperm
    - mfsymlinks
    - cache=strict
    - noserverino
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb

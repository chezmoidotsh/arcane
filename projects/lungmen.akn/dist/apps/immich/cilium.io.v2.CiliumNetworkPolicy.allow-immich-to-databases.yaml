---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Immich to access the secured mutualized PostgreSQL database.
  labels:
    app.kubernetes.io/instance: immich
    app.kubernetes.io/name: immich
  name: allow-immich-to-databases
  namespace: immich
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        cnpg.io/cluster: apps-secured-20260530
        io.kubernetes.pod.namespace: databases
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: immich
    app.kubernetes.io/name: immich
  name: immich-smb-credentials
  namespace: immich
spec:
  data:
    - remoteRef:
        key: lungmen.akn/immich/storage/smb
        property: username
      secretKey: username
    - remoteRef:
        key: lungmen.akn/immich/storage/smb
        property: password
      secretKey: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: immich-smb-credentials

---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  labels:
    app.kubernetes.io/instance: apps-secured-20260329
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mutualized-cnpg-databases
    helm.sh/chart: mutualized-cnpg-databases-0.1.0
    mutualized.cloudnative-pg.io/cluster: apps-secured-20260329
    mutualized.cloudnative-pg.io/database: paperless
    mutualized.cloudnative-pg.io/group: apps-secured
    mutualized.cloudnative-pg.io/user: paperless
  name: cnpg.apps-secured-paperless-paperless-credentials
spec:
  data:
    - conversionStrategy: None
      match:
        remoteRef:
          property: username
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: username
    - conversionStrategy: None
      match:
        remoteRef:
          property: password
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: password
    - conversionStrategy: None
      match:
        remoteRef:
          property: host
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: host
    - conversionStrategy: None
      match:
        remoteRef:
          property: port
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: port
    - conversionStrategy: None
      match:
        remoteRef:
          property: dbname
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: dbname
    - conversionStrategy: None
      match:
        remoteRef:
          property: uri
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: uri
    - conversionStrategy: None
      match:
        remoteRef:
          property: jdbc-uri
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: jdbc-uri
    - conversionStrategy: None
      match:
        remoteRef:
          property: pgpass
          remoteKey: lungmen.akn/data/paperless-ngx/database/postgresql
        secretKey: pgpass
  deletionPolicy: Delete
  refreshInterval: 5m
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: vault.chezmoi.sh
  selector:
    secret:
      name: cnpg.apps-secured-paperless-paperless-credentials
  template:
    data:
      dbname: paperless
      host: apps-secured-20260329-rw.databases.svc
      jdbc-uri: jdbc:postgresql://apps-secured-20260329-rw.databases.svc:5432/paperless?user={{
        .username }}&password={{ .password }}
      password: "{{ .password }}"
      pgpass: apps-secured-20260329-rw.databases.svc:5432:paperless:{{ .username }}:{{
        .password }}
      port: "5432"
      uri: postgresql://{{ .username }}:{{ .password }}@apps-secured-20260329-rw.databases.svc:5432/paperless
      username: "{{ .username }}"
  updatePolicy: Replace

---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: apps-secured-selfhosted
  namespace: databases
spec:
  configuration:
    data:
      compression: bzip2
    destinationPath: s3://cnpg-lungmen-akn/apps-secured
    endpointURL: https://s3.chezmoi.sh
    s3Credentials:
      accessKeyId:
        key: access_key_id
        name: cnpg-backup-credentials
      region:
        key: region
        name: cnpg-backup-credentials
      secretAccessKey:
        key: access_secret_key
        name: cnpg-backup-credentials
    wal:
      compression: bzip2
  instanceSidecarConfiguration:
    env:
    - name: AWS_REQUEST_CHECKSUM_CALCULATION
      value: when_required
    - name: AWS_RESPONSE_CHECKSUM_VALIDATION
      value: when_required
  retentionPolicy: 30d

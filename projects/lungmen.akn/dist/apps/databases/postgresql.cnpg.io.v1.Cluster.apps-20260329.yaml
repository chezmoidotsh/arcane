---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  labels:
    app.kubernetes.io/instance: apps-20260329
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mutualized-cnpg-databases
    helm.sh/chart: mutualized-cnpg-databases-0.1.0
    mutualized.cloudnative-pg.io/cluster: apps-20260329
    mutualized.cloudnative-pg.io/group: apps
  name: apps-20260329
spec:
  description: Shared PostgreSQL database cluster for common applications
  enablePDB: false
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    major: 17
    name: default
  instances: 1
  managed:
    roles:
    - comment: Managed role for atuin/atuin
      connectionLimit: -1
      ensure: present
      inherit: true
      login: true
      name: atuin
      passwordSecret:
        name: cnpg.apps-atuin-atuin-credentials
    - comment: Managed role for n8n/n8n
      connectionLimit: -1
      ensure: present
      inherit: true
      login: true
      name: n8n
      passwordSecret:
        name: cnpg.apps-n8n-n8n-credentials
    - comment: Managed role for linkding/linkding
      connectionLimit: -1
      ensure: present
      inherit: true
      login: true
      name: linkding
      passwordSecret:
        name: cnpg.apps-linkding-linkding-credentials
    - comment: Managed role for forgejo/forgejo
      connectionLimit: -1
      ensure: present
      inherit: true
      login: true
      name: forgejo
      passwordSecret:
        name: cnpg.apps-forgejo-forgejo-credentials
  plugins:
  - enabled: true
    isWALArchiver: false
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: apps-selfhosted
      serverName: 01KMWETKMBK0MYNB3X7RH6BT0X
  postgresql:
    parameters:
      max_slot_wal_keep_size: 900MB
      max_wal_size: 100MB
  storage:
    size: 2Gi
  walStorage:
    size: 2Gi

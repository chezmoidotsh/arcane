---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  labels:
    app.kubernetes.io/instance: apps-20260329
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mutualized-cnpg-databases
    helm.sh/chart: mutualized-cnpg-databases-0.1.0
    mutualized.cloudnative-pg.io/cluster: apps-20260329
    mutualized.cloudnative-pg.io/database: n8n
    mutualized.cloudnative-pg.io/group: apps
    mutualized.cloudnative-pg.io/user: n8n
  name: cnpg.apps-n8n-n8n-credentials
spec:
  data:
  - conversionStrategy: None
    match:
      remoteRef:
        property: username
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: username
  - conversionStrategy: None
    match:
      remoteRef:
        property: password
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: password
  - conversionStrategy: None
    match:
      remoteRef:
        property: host
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: host
  - conversionStrategy: None
    match:
      remoteRef:
        property: port
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: port
  - conversionStrategy: None
    match:
      remoteRef:
        property: dbname
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: dbname
  - conversionStrategy: None
    match:
      remoteRef:
        property: uri
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: uri
  - conversionStrategy: None
    match:
      remoteRef:
        property: jdbc-uri
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: jdbc-uri
  - conversionStrategy: None
    match:
      remoteRef:
        property: pgpass
        remoteKey: lungmen.akn/data/n8n/database/postgresql
      secretKey: pgpass
  deletionPolicy: Delete
  refreshInterval: 5m
  secretStoreRefs:
  - kind: ClusterSecretStore
    name: vault.chezmoi.sh
  selector:
    secret:
      name: cnpg.apps-n8n-n8n-credentials
  template:
    data:
      dbname: n8n
      host: apps-20260329-rw.databases.svc
      jdbc-uri: jdbc:postgresql://apps-20260329-rw.databases.svc:5432/n8n?user={{
        .username }}&password={{ .password }}
      password: '{{ .password }}'
      pgpass: apps-20260329-rw.databases.svc:5432:n8n:{{ .username }}:{{ .password
        }}
      port: "5432"
      uri: postgresql://{{ .username }}:{{ .password }}@apps-20260329-rw.databases.svc:5432/n8n
      username: '{{ .username }}'
  updatePolicy: Replace

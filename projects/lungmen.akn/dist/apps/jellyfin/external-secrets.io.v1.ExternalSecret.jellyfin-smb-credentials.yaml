---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/instance: jellyfin
    app.kubernetes.io/name: jellyfin
  name: jellyfin-smb-credentials
  namespace: jellyfin
spec:
  data:
  - remoteRef:
      key: lungmen.akn/jellyfin/storage/smb
      property: username
    secretKey: username
  - remoteRef:
      key: lungmen.akn/jellyfin/storage/smb
      property: password
    secretKey: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: jellyfin-smb-credentials

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oidc-credentials
  namespace: forgejo
spec:
  dataFrom:
    - extract:
        key: lungmen.akn/forgejo/auth/oidc-client
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: forgejo-oidc-credentials
    template:
      data:
        key: "{{ .client_id }}"
        secret: "{{ .client_secret }}"
      engineVersion: v2
      type: Opaque

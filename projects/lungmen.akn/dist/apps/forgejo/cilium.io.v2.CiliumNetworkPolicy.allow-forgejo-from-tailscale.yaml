apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Tailscale proxies to route HTTPS traffic to Forgejo.
  name: allow-forgejo-from-tailscale
  namespace: forgejo
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: tailscale-system
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP

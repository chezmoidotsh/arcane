---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin-credentials
  namespace: forgejo
spec:
  dataFrom:
  - extract:
      key: lungmen.akn/forgejo/admin/credentials
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: forgejo-admin-credentials
    template:
      data:
        password: '{{ .password }}'
        username: '{{ .username }}'
      engineVersion: v2
      type: Opaque

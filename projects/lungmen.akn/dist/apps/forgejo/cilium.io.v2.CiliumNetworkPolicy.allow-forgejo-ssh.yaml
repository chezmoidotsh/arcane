---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows inbound SSH connections to Forgejo for git clone/push over SSH.
  name: allow-forgejo-ssh
  namespace: forgejo
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  ingress:
  - toPorts:
    - ports:
      - port: "2222"
        protocol: TCP

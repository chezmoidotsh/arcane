---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/include-unifi: "true"
    link.argocd.argoproj.io/external-link: https://git.chezmoi.sh
  labels:
    app: forgejo
    app.kubernetes.io/instance: forgejo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/version: 15.0.2
    helm.sh/chart: forgejo-17.1.0
    version: 15.0.2
  name: forgejo
  namespace: forgejo
spec:
  hostnames:
    - git.chezmoi.sh
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: default
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: forgejo-http
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /

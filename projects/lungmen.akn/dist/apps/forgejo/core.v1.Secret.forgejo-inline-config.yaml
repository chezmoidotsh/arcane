---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app: forgejo
    app.kubernetes.io/instance: forgejo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/version: 15.0.2
    helm.sh/chart: forgejo-17.1.0
    version: 15.0.2
  name: forgejo-inline-config
  namespace: forgejo
stringData:
  _generals_: |-
    APP_NAME=Forgejo: Beyond coding. We forge.
    RUN_MODE=prod
  cache: |-
    ADAPTER=redis
    HOST=redis://forgejo-valkey:6379/1
  database: DB_TYPE=sqlite3
  log: LEVEL=Info
  metrics: ENABLED=false
  oauth2_client: |-
    ACCOUNT_LINKING=login
    ENABLE_AUTO_REGISTRATION=true
    OPENID_CONNECT_SCOPES=openid email profile groups
    UPDATE_AVATAR=true
  openid: |-
    ENABLE_OPENID_SIGNIN=false
    ENABLE_OPENID_SIGNUP=false
  queue: |-
    CONN_STR=redis://forgejo-valkey:6379/0
    TYPE=redis
  repository: ROOT=/data/git/gitea-repositories
  security: INSTALL_LOCK=true
  server: |-
    APP_DATA_PATH=/data
    DOMAIN=git.chezmoi.sh
    ENABLE_PPROF=false
    HTTP_PORT=3000
    PROTOCOL=http
    ROOT_URL=https://git.chezmoi.sh
    SSH_DOMAIN=git.chezmoi.sh
    SSH_LISTEN_PORT=2222
    SSH_PORT=22
    START_SSH_SERVER=true
  service: DISABLE_REGISTRATION=true
  session: |-
    PROVIDER=redis
    PROVIDER_CONFIG=redis://forgejo-valkey:6379/2
type: Opaque

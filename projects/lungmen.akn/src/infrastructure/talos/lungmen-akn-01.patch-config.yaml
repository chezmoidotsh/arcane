machine:
  # -- Node configuration
  type: controlplane
  network:
    hostname: lungmen-akn-01

  # -- Machine installation
  install:
    # enabled extentions:
    # - siderolabs/intel-ucode
    # - siderolabs/iscsi-tools
    # - siderolabs/util-linux-tools
    image: factory.talos.dev/nocloud-installer-secureboot/36cd6536eaec8ba802be2d38974108359069cedba8857302f69792b26b87c010:v1.13.2
    diskSelector:
      type: hdd
      model: QEMU HARDDISK
    wipe: true

  # -- Custom configuration (enable user namespaces)
  kubelet:
    clusterDNS:
      - 10.96.0.10
    extraArgs:
      rotate-server-certificates: true # NOTE: This is required for Metrics Server
    extraConfig:
      featureGates:
        # UserNamespacesSupport: alpha K8s 1.25 · beta K8s 1.28 · GA K8s 1.33
        # Gate can be dropped once confirmed the cluster runs ≥1.34 without it.
        UserNamespacesSupport: true
        # ImageVolume: alpha K8s 1.31 · beta K8s 1.33
        # Review graduation status before each minor upgrade.
        ImageVolume: true
  sysctls:
    user.max_user_namespaces: "11255"

  # Features describe individual Talos features that can be switched on or off.
  features:
    # Configures host DNS caching resolver.
    hostDNS:
      enabled: true # Enable host DNS caching resolver.
      forwardKubeDNSToHost: true # Use the host DNS resolver as upstream for Kubernetes CoreDNS pods.
      resolveMemberNames: true # Enable DNS resolution of member names in Kubernetes.
    imageCache:
      localEnabled: false # Disable local image cache.

cluster:
  allowSchedulingOnControlPlanes: true

  # -- Network configuration (disable CNI to allow Cilium to work)
  network:
    cni:
      name: custom
      urls:
        - https://raw.githubusercontent.com/chezmoi-sh/arcane/refs/heads/main/catalog/talos/manifests/cilium/1.18.1.yaml
  proxy:
    disabled: true

  # -- Custom configuration (enable user namespaces)
  apiServer:
    extraArgs:
      # UserNamespacesSupport: alpha K8s 1.25 · beta K8s 1.28 · GA K8s 1.33
      # ImageVolume: alpha K8s 1.31 · beta K8s 1.33
      # When removing a graduated gate: talosctl patch machineconfig is a STRATEGIC MERGE
      # and cannot delete keys. Extract + edit + re-apply:
      #   talosctl get machineconfig -o yaml > /tmp/mc.yaml
      #   # edit /tmp/mc.yaml — remove the gate from both kubelet.extraConfig.featureGates
      #   # and apiServer.extraArgs.feature-gates
      #   talosctl apply-config --file /tmp/mc.yaml
      feature-gates: UserNamespacesSupport=true,ImageVolume=true

  # -- Install extra components
  extraManifests:
    # -- Metrics Server
    - https://raw.githubusercontent.com/chezmoi-sh/arcane/refs/heads/main/catalog/talos/manifests/kubelet-serving-cert-approver/0.9.1.yaml
    - https://raw.githubusercontent.com/chezmoi-sh/arcane/refs/heads/main/catalog/talos/manifests/metric-server/0.7.2.yaml

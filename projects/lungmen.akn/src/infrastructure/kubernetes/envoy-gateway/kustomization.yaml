---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

helmCharts:
  - name: gateway-helm
    releaseName: envoy-gateway
    repo: oci://docker.io/envoyproxy
    # renovate: datasource=helm depName=gateway-helm registryUrl=docker.io/envoyproxy
    version: 1.8.0
    valuesFile: helmvalues/default.yaml

resources:
  - ../../../../../../catalog/kubernetes/envoy-gateway/kustomize
  - default.envoyproxy.yaml

patches:
  - path: wildcard.chezmoi.sh.certificate.yaml
  - path: default.gateway.patch.yaml

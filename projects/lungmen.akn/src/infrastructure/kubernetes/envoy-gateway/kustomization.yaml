---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

helmCharts:
  - repo: oci://docker.io/envoyproxy
    name: gateway-helm
    # renovate: datasource=helm depName=gateway-helm registryUrl=docker.io/envoyproxy
    version: 1.8.0

    releaseName: envoy-gateway
    namespace: envoy-gateway-system

    valuesFile: ../../../../../../catalog/kubernetes/envoy-gateway/helm/default.helmvalues.yaml
    additionalValuesFiles:
      - ../../../../../../catalog/kubernetes/envoy-gateway/helm/hardened.helmvalues.yaml

resources:
  - ../../../../../../catalog/kubernetes/envoy-gateway/kustomize
  - default.envoyproxy.yaml

patches:
  - path: wildcard.chezmoi.sh.certificate.yaml
  - path: default.gateway.patch.yaml

images:
  - name: docker.io/envoyproxy/gateway
    newName: oci.chezmoi.sh/docker.io/envoyproxy/gateway

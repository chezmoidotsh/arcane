---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-secrets-system

helmCharts:
  - repo: https://charts.external-secrets.io/
    name: external-secrets
    # renovate: datasource=helm depName=external-secrets registryUrl=https://charts.external-secrets.io
    version: 1.3.2

    releaseName: external-secrets
    namespace: external-secrets-system

    valuesFile: ../../../../../../catalog/kubernetes/external-secrets/helm/default.helmvalues.yaml
    additionalValuesFiles:
      - ../../../../../../catalog/kubernetes/external-secrets/helm/hardened.helmvalues.yaml

resources:
  - ../../../../../../catalog/kubernetes/external-secrets/kustomize

patches:
  - patch: |-
      - op: add
        path: /spec/provider/vault/auth/kubernetes/mountPath
        value: lungmen.akn
      - op: add
        path: /spec/provider/vault/auth/kubernetes/role
        value: lungmen.akn-eso-role
    target:
      kind: ClusterSecretStore
      name: vault.chezmoi.sh

# External Secrets Operator Helm values — default + hardened
# system:auth-delegator is required for ESO to authenticate with the Kubernetes
# API on OpenBao.
extraObjects:
  - apiVersion: rbac.authz.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: external-secrets-operator:system:auth-delegator
    roleRef:
      apiGroup: rbac.authz.k8s.io
      kind: ClusterRole
      name: system:auth-delegator
    subjects:
      - kind: ServiceAccount
        name: external-secrets
        namespace: external-secrets-system

# Security context
podSecurityContext:
  runAsUser: 23987
  runAsGroup: 23987
  runAsNonRoot: true
  fsGroup: 23987
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

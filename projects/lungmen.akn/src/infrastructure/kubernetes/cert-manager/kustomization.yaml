---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager-system

helmCharts:
  - name: cert-manager
    releaseName: cert-manager
    repo: https://charts.jetstack.io
    # renovate: datasource=helm depName=cert-manager registryUrl=https://charts.jetstack.io
    version: v1.20.2
    valuesFile: ../../../../../../catalog/kubernetes/cert-manager/helm/default.helmvalues.yaml
    additionalValuesFiles:
      - ../../../../../../catalog/kubernetes/cert-manager/helm/hardened.helmvalues.yaml

resources:
  - ../../../../../../catalog/kubernetes/cert-manager/kustomize

patches:
  - path: letsencrypt-issuer-credentials.externalsecret.yaml

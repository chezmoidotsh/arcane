---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: apps-secured-litellm
spec:
  cluster:
    name: postgres-apps-secured
  name: litellm
  owner: litellm
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-database-credentials
spec:
  dataFrom:
    - extract:
        key: lungmen.akn/litellm/database/postgresql
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    template:
      data:
        username: litellm
        password: "{{ .password }}"

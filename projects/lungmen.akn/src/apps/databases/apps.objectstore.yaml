---
# apps.objectstore.yaml
#
# ObjectStore resource for the postgres-apps CNPG cluster.
# Manages WAL archiving and base backups to S3-compatible storage (s3.chezmoi.sh).
#
# Resources:
#   - barmancloud.cnpg.io/v1 ObjectStore  (apps-selfhosted)
#       Referenced by the barman-cloud plugin in postgres-apps.helmvalues.yaml via
#       spec.objectStoreSpec.name + parameters.inheritedBarmanObjectName: true.
#
# Credentials:
#   cnpg-backup-credentials Secret is provided by apps-secured.objectstore.yaml
#   (shared ExternalSecret — defined once, consumed by both clusters).
#
# Network policy:
#   postgres-apps-allow-to-s3-backup is managed in security/network-policy.allow-to-s3-backup.yaml
#   alongside all other non-chart-managed policies for this namespace.

apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: apps-selfhosted
  namespace: databases
spec:
  configuration:
    data:
      compression: bzip2
    destinationPath: s3://cnpg-backups/lungmen.akn/apps
    endpointURL: https://s3.chezmoi.sh:9000
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-credentials
        key: access_key_id
      secretAccessKey:
        name: cnpg-backup-credentials
        key: access_secret_key
      region:
        name: cnpg-backup-credentials
        key: region
    wal:
      compression: bzip2
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  retentionPolicy: 7d

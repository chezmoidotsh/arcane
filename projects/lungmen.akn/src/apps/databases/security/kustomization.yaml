---
# databases/security/kustomization.yaml
#
# Namespace-level security policies for the databases namespace.
#
# Policies kept here (NOT managed by the mutualized-cnpg-databases chart):
#   - default-hardened              : namespace-wide deny-all baseline (not cluster-specific)
#   - allow-qdrant-from-n8n         : Qdrant-specific ingress (not a CNPG resource)
#   - allow-to-s3-backup            : S3 backup egress for both CNPG clusters
#                                     (chart scope intentionally excludes S3 policies)
#
# Policies removed from this file (now rendered by the chart):
#
#   Cluster-level CNPG policies (behavior.networkPolicies.*):
#     Previously standalone              → Now chart-generated (behavior.networkPolicies.fromOperator / toKubeApiserver)
#     allow-cnpg-databases-from-cnpg    → apps-allow-from-cnpg-operator
#                                          apps-secured-allow-from-cnpg-operator
#     allow-cnpg-databases-to-k8s-api   → apps-allow-to-kube-apiserver
#                                          apps-secured-allow-to-kube-apiserver
#
#   Per-database ingress policies (spec.databases[].allowedApplicationSelector):
#     Previously standalone                              → Now chart-generated
#     allow-apps-database-from-mealie                   → allow-apps-database-from-mealie
#     allow-apps-database-from-n8n                      → allow-apps-database-from-n8n
#     allow-apps-database-from-atuin                    → allow-apps-database-from-atuin
#     allow-apps-database-from-jellyseerr               → allow-apps-database-from-jellyseerr
#     allow-apps-database-from-linkding                 → allow-apps-database-from-linkding
#     allow-apps-secured-database-from-open-webui       → allow-apps-secured-database-from-open-webui
#     allow-apps-secured-database-from-litellm          → allow-apps-secured-database-from-litellm
#     allow-apps-secured-database-from-immich           → allow-apps-secured-database-from-immich
#     allow-apps-secured-database-from-paperless-ngx    → allow-apps-secured-database-from-paperless
#
# The standalone YAML files for the per-database policies above are kept on disk for
# reference but are NO LONGER INCLUDED in this kustomization. The chart owns them now.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases

resources:
  # Namespace-wide deny-all baseline. Must remain here — it is not cluster-specific
  # and is intentionally outside the chart's scope.
  - network-policy.default-hardened.yaml

  # S3 backup egress for both CNPG clusters (postgres-apps + postgres-apps-secured).
  # Previously generated by the mutualized-cnpg-databases chart; moved here when
  # ObjectStore and S3 network policy management was taken out of the chart scope.
  - network-policy.allow-to-s3-backup.yaml

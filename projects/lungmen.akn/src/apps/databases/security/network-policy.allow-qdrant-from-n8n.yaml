---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows n8n (main and workers) to access Qdrant within the databases namespace.
  name: allow-qdrant-from-n8n
  namespace: databases
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: n8n
            app.kubernetes.io/name: n8n
      toPorts:
        - ports:
            - port: "6333"
              protocol: TCP
            - port: "6334"
              protocol: TCP

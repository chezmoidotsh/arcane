apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows all mutualized PostgreSQL clusters to connect to
      the Kubernetes API server. Required for CloudNative-PG operator integration.
  name: allow-cnpg-databases-to-kubernetes-api
  namespace: databases
spec:
  endpointSelector:
    - matchExpressions:
        - key: cnpg.io/cluster
          operator: Exists
  egress:
    - toEntities:
        - kube-apiserver

---
apiVersion: helm.sh/v1alpha1
kind: CNPGMutualizedCluster

metadata:
  # -- Identifies the secure tier; drives naming for all high-value database resources.
  name: apps-secured

spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh

  behavior:
    passwords:
      pushInterval: "5m"
    networkPolicies:
      enabled: true

  cluster:
    name: "20260530"
    description: "Shared PostgreSQL database cluster for applications with sensitive data"

    # -- Mandatory for sensitive workloads to prevent unplanned downtime during node drains.
    enablePDB: true
    imageCatalogRef:
      apiGroup: postgresql.cnpg.io
      kind: ImageCatalog
      name: postgresql-vchord
      major: 17

    # -- High-Availability configuration (1 Primary + 1 Replica).
    instances: 2
    storage:
      size: 5Gi
    # -- Reduced from 5Gi: WAL archiving is disabled (isWALArchiver: false), so WALs are
    # recycled automatically after each checkpoint. 2Gi is ample for max_wal_size: 100MB.
    walStorage:
      size: 2Gi
    postgresql:
      parameters:
        max_wal_size: 100MB
        # -- Caps WAL retained for the streaming replica slot. Without this, a lagging
        # replica could fill the 2Gi walStorage even without WAL archiving.
        # At 1500MB the slot is invalidated and the replica does a fresh pg_basebackup
        # rather than crashing the primary — acceptable trade-off for a homelab.
        max_slot_wal_keep_size: 1500MB

      shared_preload_libraries:
        - vchord

    postgresUID: 999
    postgresGID: 999

    # -- Bootstrap from the last backup of apps-secured-20260329.
    # CNPG restores the base backup and replays available WALs to reach consistency.
    # After bootstrap the cluster operates normally; this block is ignored on subsequent reconciliations.
    bootstrap:
      recovery:
        source: apps-secured-20260329

    # -- Source cluster for bootstrap recovery.
    externalClusters:
      - name: apps-secured-20260329
        plugin:
          name: barman-cloud.cloudnative-pg.io
          parameters:
            barmanObjectName: apps-secured-selfhosted
            serverName: 01KMWETKMBK0MYNB3X7RH6BT0X

    plugins:
      - enabled: true
        # -- WAL archiving disabled: PostgreSQL recycles WALs automatically after checkpoint.
        # This prevents WAL disk fill-up even when S3 is unavailable.
        # Trade-off: no PITR — recovery relies on daily base backups (see apps-secured.scheduledbackup.yaml).
        isWALArchiver: false
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: apps-secured-selfhosted
          serverName: 01KSWX2DMP9RNXX19Z23W2T57M

  databases:
    - name: immich
      extensions:
        # -- Specific extensions required for Immich's photo/spatial metadata features.
        - name: cube
        - name: earthdistance
        - name: vector
      users:
        - name: immich
          vault:
            path: lungmen.akn/data/immich/database/postgresql
      allowedApplicationSelector:
        - endpointSelector:
            - matchLabels:
                io.kubernetes.pod.namespace: immich
                app.kubernetes.io/name: immich

    - name: paperless
      users:
        - name: paperless
          vault:
            path: lungmen.akn/data/paperless-ngx/database/postgresql
      allowedApplicationSelector:
        - endpointSelector:
            - matchLabels:
                io.kubernetes.pod.namespace: paperless-ngx
                app.kubernetes.io/component: webserver

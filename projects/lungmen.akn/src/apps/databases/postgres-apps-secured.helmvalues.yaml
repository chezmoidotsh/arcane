---
apiVersion: helm.sh/v1alpha1
kind: CNPGMutualizedCluster

metadata:
  # -- Identifies the secure tier; drives naming for all high-value database resources.
  name: apps-secured

spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh

  behavior:
    passwords:
      pushInterval: "5m"
    networkPolicies:
      enabled: true

  cluster:
    name: "20260329"
    description: "Shared PostgreSQL database cluster for applications with sensitive data"

    # -- Mandatory for sensitive workloads to prevent unplanned downtime during node drains.
    enablePDB: true
    imageCatalogRef:
      apiGroup: postgresql.cnpg.io
      kind: ImageCatalog
      name: postgresql-vchord
      major: 17

    # -- High-Availability configuration (1 Primary + 1 Replica).
    instances: 2
    storage:
      size: 5Gi
    walStorage:
      size: 5Gi
    postgresql:
      parameters:
        max_slot_wal_keep_size: 900MB
        max_wal_size: 100MB

      shared_preload_libraries:
        - vchord

    postgresUID: 999
    postgresGID: 999
    bootstrap:
      initdb:
        postInitSQL:
          # -- Ensures all extensions are ready for use immediately after provisioning.
          - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
    plugins:
      - enabled: true
        isWALArchiver: true
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: apps-secured-selfhosted
          serverName: 01KMWETKMBK0MYNB3X7RH6BT0X

  databases:
    - name: immich
      extensions:
        # -- Specific extensions required for Immich's photo/spatial metadata features.
        - name: cube
        - name: earthdistance
        - name: vector
      users:
        - name: immich
          vault:
            path: lungmen.akn/data/immich/database/postgresql
      allowedApplicationSelector:
        - endpointSelector:
            - matchLabels:
                io.kubernetes.pod.namespace: immich
                app.kubernetes.io/name: immich

    - name: paperless
      users:
        - name: paperless
          vault:
            path: lungmen.akn/data/paperless-ngx/database/postgresql
      allowedApplicationSelector:
        - endpointSelector:
            - matchLabels:
                io.kubernetes.pod.namespace: paperless-ngx
                app.kubernetes.io/component: webserver

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases

resources:
  # postgres-apps cluster and backing object store
  - apps.objectstore.yaml
  - apps.postgresql.yaml

  # per-DB manifests for postgres-apps (one file per DB + its ExternalSecret)
  - postgresql.apps/mealie.yaml
  - postgresql.apps/n8n.yaml
  - postgresql.apps/atuin.yaml
  - postgresql.apps/jellyseerr.yaml
  - postgresql.apps/linkding.yaml

  # postgres-apps-secured cluster and (optional) backing object store
  - apps-secured.objectstore.yaml
  - apps-secured.postgresql.yaml
  - cnpg-backup-credentials.externalsecret.yaml

  # per-DB manifests for postgres-apps-secured (one file per DB + its ExternalSecret)
  - postgresql.apps-secured/open-webui.yaml
  - postgresql.apps-secured/litellm.yaml
  - postgresql.apps-secured/immich.yaml
  - postgresql.apps-secured/paperless.yaml

  # security overlays / network policies
  - security/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-movies-smb-storage
  namespace: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: smb
  volumeName: jellyfin-movies-smb-storage
---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  name: jellyfin-movies-smb-storage
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - uid=64710
    - gid=64710
    - noperm
    - mfsymlinks
    - cache=strict
    - noserverino # required to prevent data corruption
  csi:
    driver: smb.csi.k8s.io
    readOnly: true
    # volumeHandle format: {smb-server-address}#{sub-dir-name}#{share-name}
    # make sure this value is unique for every share in the cluster
    volumeHandle: smb-server.default.svc.cluster.local/jellyfin-movies##
    volumeAttributes:
      source: //nas.chezmoi.sh/Films
    nodeStageSecretRef:
      name: jellyfin-smb-credentials
      namespace: jellyfin
---

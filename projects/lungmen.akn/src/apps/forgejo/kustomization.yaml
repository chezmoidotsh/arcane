---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo

helmCharts:
  - repo: oci://code.forgejo.org/forgejo-helm
    name: forgejo
    version: 17.1.0

    releaseName: forgejo
    namespace: forgejo

    valuesFile: forgejo.helmvalues/default.yaml
    additionalValuesFiles:
      - forgejo.helmvalues/hardened.yaml
  - repo: https://valkey-io.github.io/valkey-helm/
    name: valkey
    version: 0.9.4

    releaseName: forgejo-valkey
    namespace: forgejo

    valuesFile: valkey.helmvalues/default.yaml

resources:
  - forgejo.database.externalsecret.yaml
  - forgejo.admin.externalsecret.yaml
  - forgejo.oidc.externalsecret.yaml
  - forgejo.tailscale.yaml

  - security/

# kustomize's namespace transformer does not post-process helmCharts resources.
# Charts that do not call {{ .Release.Namespace }} in their templates (valkey)
# produce resources without a namespace field. This patch injects it.
patches:
  - patch: |
      - op: add
        path: /metadata/namespace
        value: forgejo
    target:
      labelSelector: "app.kubernetes.io/instance=forgejo-valkey"

images:
  - name: code.forgejo.org/forgejo/forgejo
    newName: oci.chezmoi.sh/code.forgejo.org/forgejo/forgejo
  - name: docker.io/valkey/valkey
    newName: oci.chezmoi.sh/docker.io/valkey/valkey
  - name: busybox
    newName: oci.chezmoi.sh/docker.io/library/busybox

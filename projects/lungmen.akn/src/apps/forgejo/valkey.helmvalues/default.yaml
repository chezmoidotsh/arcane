# Valkey Helm chart values for Forgejo cache/session/queue
# Ref: https://github.com/valkey-io/valkey-helm/blob/main/charts/valkey/values.yaml

architecture: standalone

auth:
  enabled: false

primary:
  persistence:
    enabled: true
    size: 1Gi

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

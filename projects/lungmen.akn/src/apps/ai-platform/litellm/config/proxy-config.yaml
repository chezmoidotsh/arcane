# LiteLLM Proxy Configuration
# Official Documentation: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # - model_name: exhaustive-example
  #   litellm_params:
  #     # --- 1. Backend Identity & Routing ---
  #     model: openai/gpt-4o                         # REQUIRED: Provider + Model string (e.g. azure/gpt-4, bedrock/anthropic...)
  #     api_base: http://localhost:8080/v1           # Base URL for the API (useful for local/private endpoints)
  #     api_version: "2024-02-15-preview"            # Specific API version (common for Azure)
  #     custom_llm_provider: "openai"                # Explicitly set the provider (inferred from 'model' prefix usually)
  #     region_name: "us-east-1"                     # Region for AWS/GCP/Azure deployments

  #     # --- 2. Authentication & Credentials ---
  #     api_key: os.environ/MY_API_KEY               # API Key (best practice: use os.environ/ prefix)
  #     # aws_access_key_id: "..."                   # AWS specific auth
  #     # aws_secret_access_key: "..."
  #     # vertex_project: "..."                      # Google Vertex AI specific
  #     # vertex_location: "..."

  #     # --- 3. Proxy-Level Limits & Priorities (Router) ---
  #     rpm: 100                                     # Request Per Minute limit for this specific backend
  #     tpm: 100000                                  # Token Per Minute limit
  #     tph: 10                                      # Token Per Hour limit
  #     max_parallel_requests: 5                     # Max concurrent requests to this specific backend
  #     weight: 10                                   # For weighted load balancing (higher = more traffic)
  #     priority: 1                                  # For priority-based routing (lower = higher priority)

  #     # --- 4. Timeouts & Retries ---
  #     timeout: 300                                 # Global request timeout (seconds)
  #     stream_timeout: 60                           # Timeout between streaming chunks (seconds)
  #     num_retries: 3                               # Max retries on failure for this specific model

  #     # --- 5. Default Generation Settings (Overrides) ---
  #     max_tokens: 4096                             # Limit tokens generated by default
  #     temperature: 0.7                             # Default creativity setting
  #     top_p: 1.0                                   # Nucleus sampling default
  #     presence_penalty: 0.0                        # Penalty for repeating topics
  #     frequency_penalty: 0.0                       # Penalty for repeating words
  #     stop: ["# END"]                              # Default stop sequences
  #     response_format: { "type": "json_object" }   # Force JSON output mode

  #     # --- 6. Advanced & Metadata ---
  #     extra_body: { "top_k": 50 }                  # Pass specialized/provider-only fields not handled by LiteLLM
  #     input_cost_per_token: 0.000001               # Manual cost tracking override
  #     output_cost_per_token: 0.000002
  #     # tags: ["production", "critical"]           # Arbitrary tags for filtering/logging

  - model_name: Kokoro TTS
    litellm_params:
      model: hexgrad/kokoro
      api_base: http://kokoro.llm.chezmoi.sh:1234/v1
      api_key: _

  - model_name: Whisper STT
    litellm_params:
      model: openai/whisper-large-v3-turbo
      api_base: http://whisper.llm.chezmoi.sh:1234/
      api_key: _

general_settings:
  # --- Administrative & Security ---
  master_key: os.environ/LITELLM_MASTER_KEY  # Admin key (must start with sk-). Enforces auth on all endpoints.
  database_url: os.environ/DATABASE_URL      # PostgreSQL connection string for virtual keys, teams, and usage tracking.
  # master_key_hash: "..."                     # Hashed master key for increased security.
  # master_key_hash_type: "pbkdf2_sha256"      # Algorithm used for hashing the master key.

  # --- Database & Performance ---
  store_model_in_db: true                       # Enables managing models/credentials via the UI/API (stored in DB).
  supported_db_objects: [models, mcp]           # Fine-grained control over which objects to load from DB.
  proxy_batch_write_at: 60                      # Batch write spend updates to DB every N seconds.
  database_connection_pool_limit: 10            # Max DB connections per worker.
  # use_redis_transaction_buffer: false         # Use Redis as a buffer for high-traffic spend updates (1000+ RPS).
  # proxy_budget_rescheduler_min_time: 60       # Min time (s) between budget refreshes.
  # proxy_budget_rescheduler_max_time: 64       # Max time (s) between budget refreshes.

  # --- Error Handling & Reliability ---
  disable_error_logs: true                      # Don't write LLM exception stack traces to the database.
  allow_requests_on_db_unavailable: true        # Continue processing requests if the database is temporarily down.

  # --- Logging & Spend Management ---
  # disable_spend_logs: false                   # Disable all budget and usage tracking.
  # turn_off_spend_updates: false               # Keep spend logs but stop updating key/user/team spend totals.
  # store_prompts_in_spend_logs: false          # Store the actual prompt and response text in the database.
  # maximum_spend_logs_retention_period: "30d"  # Auto-delete spend logs older than this period.

  # --- Custom Routing & Endpoints ---
  # completion_model: "gpt-3.5-turbo"           # Default model to use if none is specified in the request.
  # forward_client_headers_to_llm_api: false    # Forward client-side headers (e.g. X-Client-Id) to the LLM provider.
  # pass_through_endpoints:                     # Define custom proxy routes to external APIs.
  #   - path: "/v1/rerank"
  #     target: "https://api.cohere.com/v1/rerank"
  #     headers: { "Content-Type": "application/json" }

  # --- Access Control ---
  # allowed_ips: ["10.0.0.0/24"]                # CIDR list of IPs permitted to access the proxy.
  # allow_personal_keys: true                   # Allow users to create keys without an associated team_id.
  # user_api_key_cache_time: 600                # How long (s) to cache user API keys in memory.

litellm_settings:
  # --- Core SDK Behavior ---
  # drop_params: true                           # Drop non-OpenAI params before sending the request to the provider.
  # num_retries: 2                              # Global default for retrying failed LLM calls.
  request_timeout: 900                          # Global timeout (s) for LLM requests (15 minutes).
  # stream_timeout: 60                          # Timeout (s) for streaming chunks.

  # --- Caching (Redis/Valkey) ---
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    db: os.environ/REDIS_DB
    # password: os.environ/REDIS_PASSWORD
    # ttl: 3600                                 # Global cache TTL in seconds.

  # --- Logging & Observability ---
  set_verbose: false                            # Enable debug logging (extremely noisy).
  json_logs: true                               # Use JSON format for all proxy logs.
  # success_callback: ["langfuse", "prometheus"] # Integrations to call on successful requests.
  # failure_callback: ["sentry", "slack"]       # Integrations to call on failed requests.
  # service_callbacks: ["datadog"]               # Callbacks specifically for proxy/DB health issues.
  # turn_off_message_logging: false             # Privacy: don't send prompt/response to any callback.
  # redact_user_api_key_info: false             # Privacy: redact sensitive key info from logs.

  # --- Advanced Features ---
  # force_ipv4: false                           # Force the proxy to use IPv4 for outgoing LLM requests.
  telemetry: false                              # Enable/disable LiteLLM anonymous usage telemetry.
  # enable_azure_openai_oai_preview: false      # Enable Azure OpenAI preview features (like streaming).
  # max_request_size_mb: 20                     # Restrict larger payloads.
  # max_response_size_mb: 20                    # Restrict larger response payloads.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal
  labels:
    app.kubernetes.io/component: open-terminal
    app.kubernetes.io/instance: open-terminal
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/version: latest
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: open-terminal
      app.kubernetes.io/instance: open-terminal
  template:
    metadata:
      labels:
        app.kubernetes.io/component: open-terminal
        app.kubernetes.io/instance: open-terminal
        app.kubernetes.io/name: open-terminal
        app.kubernetes.io/version: latest
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: open-terminal
          image: ghcr.io/open-webui/open-terminal
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: TERMINAL_MAX_IDLE_TIME
              value: "3600"
            - name: TERMINAL_MAX_SESSIONS
              value: "10"
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: open-terminal
  labels:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/component: open-terminal
    app.kubernetes.io/instance: open-terminal
    app.kubernetes.io/version: latest
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/component: open-terminal
    app.kubernetes.io/instance: open-terminal
    app.kubernetes.io/version: latest
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

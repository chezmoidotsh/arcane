apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  labels:
    app.kubernetes.io/component: open-webui
    app.kubernetes.io/instance: open-webui
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/version: 0.8.8
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: open-webui
      app.kubernetes.io/instance: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/component: open-webui
        app.kubernetes.io/instance: open-webui
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/version: 0.8.8
    spec:
      automountServiceAccountToken: false
      serviceAccountName: open-webui-sa
      enableServiceLinks: false
      initContainers:
        - name: copy-app-data
          image: ghcr.io/open-webui/open-webui
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - cp -R -n /app/backend/data/* /tmp/app-data/
          volumeMounts:
            - name: data
              mountPath: /tmp/app-data
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          tty: true
          env:
            - name: ENABLE_OLLAMA_API
              value: "False"
            - name: OPENAI_API_BASE_URLS
              value: http://open-webui-pipelines.default.svc.cluster.local:9099;http://192.168.10.30:1234
            - name: CONTENT_EXTRACTION_ENGINE
              value: Tika
            - name: TIKA_SERVER_URL
              value: http://open-webui-tika:9998
            - name: ENABLE_WEBSOCKET_SUPPORT
              value: "True"
            - name: WEBSOCKET_MANAGER
              value: redis
            - name: REDIS_URL
              value: redis://valkey.ai-platform.svc.cluster.local:6379/1
            - name: WEBSOCKET_REDIS_URL
              value: redis://valkey.ai-platform.svc.cluster.local:6379/1
            - name: ENABLE_OAUTH_SIGNUP
              value: "True"
            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "True"
            - name: OAUTH_CLIENT_ID
              value: 2fb91b56-0335-4b13-83bf-3ef6db424d59
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-webui-credentials
                  key: sso_client_secret
            - name: OPENID_PROVIDER_URL
              value: https://auth.chezmoi.sh/.well-known/openid-configuration
            - name: OAUTH_PROVIDER_NAME
              value: auth.chezmoi.sh
            - name: OAUTH_SCOPES
              value: openid email profile groups
            - name: ENABLE_OAUTH_ROLE_MANAGEMENT
              value: "True"
            - name: OAUTH_ROLES_CLAIM
              value: groups
            - name: OAUTH_ADMIN_ROLES
              value: admin
            - name: ENABLE_OAUTH_GROUP_MANAGEMENT
              value: "True"
            - name: OAUTH_GROUP_CLAIM
              value: groups
            - name: GLOBAL_LOG_LEVEL
              value: debug
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: open-webui-credentials
                  key: database_url
            - name: ENABLE_LOGIN_FORM
              value: "false"
            - name: ENABLE_RAG_WEB_SEARCH
              value: "true"
            - name: ENABLE_WEB_SEARCH
              value: "true"
            - name: RAG_WEB_SEARCH_ENGINE
              value: searxng
            - name: SEARXNG_QUERY_URL
              value: http://searxng.ai-platform.svc.cluster.local:8080/search
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-credentials
                  key: secret_key
            - name: ENABLE_PERSISTENT_CONFIG
              value: "True"
            - name: TERMINAL_SERVER_CONNECTIONS
              value: '[{"name": "Open Terminal", "url": "http://open-terminal.ai-platform.svc.cluster.local:8080"}]'
          resources:
            requests:
              cpu: 10m
              memory: 1.5Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 1
          readinessProbe:
            httpGet:
              path: /health/db
              port: http
            failureThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: config
              mountPath: /app/backend/data/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          configMap:
            name: open-webui-config
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: open-webui
    app.kubernetes.io/instance: open-webui
    app.kubernetes.io/version: 0.8.8
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: open-webui
    app.kubernetes.io/instance: open-webui
    app.kubernetes.io/version: 0.8.8
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

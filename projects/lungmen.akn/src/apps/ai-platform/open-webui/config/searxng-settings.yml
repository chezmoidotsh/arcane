# SearXNG configuration for OpenWebUI integration
# https://docs.searxng.org/admin/settings/settings.html

general:
  debug: false
  instance_name: "SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  # The base URL is set via SEARXNG_BASE_URL env var
  # secret_key is set via SEARXNG_SECRET env var
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "fr"
  default_theme: simple
  theme_args:
    simple_style: dark

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "fr-FR"
  formats:
    - html
    - json

engines:
  # General web search
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    language: "fr"
    disabled: false
  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false
  # Technical / dev resources
  - name: github
    engine: github
    shortcut: gh
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  pool_connections: 100
  pool_maxsize: 15
  enable_http2: true

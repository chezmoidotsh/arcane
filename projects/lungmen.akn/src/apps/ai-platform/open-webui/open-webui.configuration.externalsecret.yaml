---
# Consolidated ExternalSecret for all Open WebUI secrets
# Uses dataFrom with rewrite rules to map Vault secrets directly to environment variables
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-secrets
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: open-webui
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: open-webui-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database connection URL (templated from password)
        DATABASE_URL: "postgresql://open-webui:{{ .db_password }}@postgres-apps-secured-rw.databases.svc.cluster.local:5432/open-webui"

        # OAuth/OIDC client secret
        OAUTH_CLIENT_SECRET: "{{ .oauth_client_secret }}"

        # Encryption secret key
        WEBUI_SECRET_KEY: "{{ .webui_secret_key }}"
  dataFrom:
    # Database credentials
    - extract:
        key: lungmen.akn/open-webui/database/postgresql
      rewrite:
        - regexp:
            source: "password"
            target: "db_password"

    # OAuth/OIDC credentials
    - extract:
        key: lungmen.akn/open-webui/auth/oidc-client
      rewrite:
        - regexp:
            source: "client_secret"
            target: "oauth_client_secret"

    # Encryption keys
    - extract:
        key: lungmen.akn/open-webui/encryption/secret-key
      rewrite:
        - regexp:
            source: "key"
            target: "webui_secret_key"

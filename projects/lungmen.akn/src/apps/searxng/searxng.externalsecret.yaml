apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-secrets
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search-engine
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: searxng-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # SearXNG secret key (auto-generated)
        SEARXNG_SECRET: "{{ .searxng_secret | b64enc }}"
  dataFrom:
    # SearXNG secret key (generated by ESO)
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: searxng-secret-generator
      rewrite:
        - regexp:
            source: "password"
            target: "searxng_secret"

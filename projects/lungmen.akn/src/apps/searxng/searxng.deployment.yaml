apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
      app.kubernetes.io/component: search-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/component: search-engine
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 977
        runAsGroup: 977
        fsGroup: 977
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: searxng
          image: docker.io/searxng/searxng
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.chezmoi.sh"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secrets
                  key: SEARXNG_SECRET
            - name: SEARXNG_VALKEY_URL
              value: "valkey://valkey-searxng-master.searxng.svc.cluster.local:6379/0"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
            - name: ssl-certs
              mountPath: /etc/ssl/certs
          securityContext:
            runAsNonRoot: true
            runAsUser: 977
            runAsGroup: 977
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: searxng-config
            defaultMode: 0644
        - name: ssl-certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search-engine
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search-engine
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http

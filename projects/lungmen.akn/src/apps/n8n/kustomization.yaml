---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: n8n

resources:
  # Configuration
  - n8n.configmap.yaml

  # n8n application
  - n8n-main.deployment.yaml
  - n8n-worker.deployment.yaml

  # Redis queue
  - n8n.redis-statefulset.yaml
  - n8n.redis-service.yaml

  # External secrets
  - n8n.externalsecret-encryption-key.yaml
  - n8n.externalsecret-database.yaml

  # HTTPRoute for ingress
  - n8n.httproute.yaml

  # Security policies
  - security/

images:
  # renovate: datasource=docker depName=ghcr.io/n8n-io/n8n
  - name: ghcr.io/n8n-io/n8n
    newTag: 2.21.1@sha256:81310992ea0998ca0114d3909ef35fe4edcb5d92ec531aeb64909c698573f30d
  # renovate: datasource=docker depName=docker.io/library/redis
  - name: docker.io/library/redis
    newTag: 8.6.3-alpine

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-database-n8n
spec:
  dataFrom:
    - extract:
        key: lungmen.akn/n8n/database/postgresql
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: n8n-database-n8n
    template:
      data:
        username: n8n
        password: "{{ .password }}"

apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows the Cilium Gateway API to route traffic to the Immich application.
      Traffic proxied by Cilium Gateway API carries the reserved:ingress identity,
      as per https://docs.cilium.io/en/latest/security/policy/layer3/#entities-based
  name: allow-immich-from-cilium-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "2283"
              protocol: TCP

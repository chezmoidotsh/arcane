apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Immich to access the secured mutualized PostgreSQL database.
  name: allow-immich-to-databases
  namespace: immich
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/instance: postgres-apps-secured
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

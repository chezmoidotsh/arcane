---
# trunk-ignore(checkov/CKV_K8S_15): Not agreed with these policies about ImagePullPolicy=Always and digest verification for third-party apps
# trunk-ignore-all(checkov/CKV_K8S_10,checkov/CKV_K8S_12,checkov/CKV_K8S_13,trivy/KSV015,trivy/KSV016,trivy/KSV018): We will address resource limits when we have consumption data for Immich Server
# trunk-ignore(checkov/CKV_K8S_11): TODO - Setup resource limits when we have consumption data for Immich Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: immich-server
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: immich-server
        app.kubernetes.io/component: server
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 31847
        runAsGroup: 31847
        runAsUser: 31847
        seccompProfile:
          type: RuntimeDefault
      containers:
        # trunk-ignore(trivy/KSV0125): ghcr.io/immich-app is trusted registry for Immich official images
        - name: immich-server
          image: ghcr.io/immich-app/immich-server
          imagePullPolicy: IfNotPresent
          env:
            - name: IMMICH_CONFIG_FILE
              value: /config/immich-config.yaml
            - name: DB_URL_FILE
              value: /run/secrets/immich.app/database/url
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: REDIS_PORT
              value: "6379"
          ports:
            - name: http
              containerPort: 2283
              protocol: TCP
          livenessProbe: &immich_probe
            failureThreshold: 3
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            <<: *immich_probe
          startupProbe:
            <<: *immich_probe
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 31847
            runAsNonRoot: true
            runAsUser: 31847
          volumeMounts:
            - name: config
              mountPath: /config
            - name: library
              mountPath: /usr/src/app/upload
            - name: secrets
              mountPath: /run/secrets/immich.app
      volumes:
        - name: config
          secret:
            secretName: immich-configuration
        - name: library
          persistentVolumeClaim:
            claimName: immich-smb-storage
        - name: secrets
          projected:
            sources:
              - secret:
                  name: immich-database-immich
                  items:
                    - key: uri
                      path: database/url
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
spec:
  type: ClusterIP
  ports:
    - port: 2283
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: immich
    app.kubernetes.io/instance: immich
    app.kubernetes.io/component: server

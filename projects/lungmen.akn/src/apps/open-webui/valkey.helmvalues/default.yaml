---
# CloudPirates Valkey Helm chart values for HA deployment with Sentinel
# Used as Redis-compatible cache/session store for Open WebUI

# HA architecture: master-replica setup with Sentinel for automatic failover
architecture: replication

# 1 master + 2 replicas
replicaCount: 3

# Sentinel for automatic failover
sentinel:
  enabled: true
  masterName: open-webui-valkey
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 30000
  parallelSyncs: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

# Disable authentication (internal cluster network, secured by network policies)
auth:
  enabled: false

# Persistence for data durability
persistence:
  enabled: true
  size: 1Gi

# Resource limits for Valkey pods
resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Service configuration
service:
  type: ClusterIP
  port: 6379

# OCI Network Security Group for kazimierz.akn
#
# Provisioned resources:
#   NetworkSecurityGroup                   Instance-level firewall (VNIC-attached)
#   NetworkSecurityGroupSecurityRule × 14  See security model below
#
# Security model
# ──────────────────────────────────────────────────────────────────────
# NSGs are preferred over Security Lists: they decouple the VCN subnet
# topology from application-level security requirements, and rules apply
# at the VNIC level rather than the subnet level.
#
# The NSG is attached to the instance via claim.yaml → spec.instance.nsgIds.
# The OCID emitted in status.atProvider.id must be copied to
# claim.yaml spec.instance.nsgIds after first provisioning.
#
# Ingress rules (stateful, dual-stack):
#   Protocol  Port      Purpose                      Source
#   ───────  ────────  ────────────────────────────  ───────────────
#   TCP      22        SSH (remote admin)            0.0.0.0/0, ::/0
#   TCP      80        HTTP → HTTPS redirect         0.0.0.0/0, ::/0
#   TCP      443       HTTPS (Traefik reverse proxy) 0.0.0.0/0, ::/0
#   UDP      51820     WireGuard site tunnels (Newt) 0.0.0.0/0, ::/0
#   UDP      21820     WireGuard client tunnels      0.0.0.0/0, ::/0
#
# Egress rules (stateful, dual-stack):
#   Protocol 6 (TCP)  → 0.0.0.0/0, ::/0
#   Protocol 17 (UDP) → 0.0.0.0/0, ::/0
#
# Notes:
#   • All rules are stateful — NSG rules do not expose isStateless, unlike
#     Security Lists. OCI NSG rules are always connection-tracked.
#   • SSH (port 22) is open to the world. Access is restricted to
#     pubkey-only authentication (see claim.yaml and the NixOS config).
#   • WireGuard ports 51820/21820 are for Newt tunnel transport.
#     Further authorization is handled at the WireGuard layer.
#   • IPv6 is enabled on the VCN (Oracle GUA allocation). Subnet IPv6
#     CIDR procedure is documented in oci.network.yaml.
#
# All resources depend on the OCI ProviderConfig "default" (see oci.providerconfig.yaml).
---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: NetworkSecurityGroup
metadata:
  name: kazimierz-akn-nsg
  namespace: kazimierz-akn
spec:
  forProvider:
    compartmentIdRef:
      name: kazimierz-akn
    vcnIdRef:
      name: kazimierz-akn-vcn
    displayName: kazimierz-akn-nsg
    freeformTags:
      project: "kazimierz.akn"
      managed_by: "crossplane"
  providerConfigRef:
    name: default
    kind: ProviderConfig
# ── Ingress rules ──────────────────────────────────────────────────────
---
# TCP/22 — SSH (remote admin, pubkey-only)
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: NetworkSecurityGroupSecurityRule
metadata:
  name: kazimierz-akn-nsg-ingress-tcp22-ipv4
  namespace: kazimierz-akn
spec:
  forProvider:
    networkSecurityGroupIdRef:
      name: kazimierz-akn-nsg
    direction: INGRESS
    protocol: "6"
    source: "0.0.0.0/0"
    sourceType: CIDR_BLOCK
    tcpOptions:
      - destinationPortRange:
          - min: 22
            max: 22
  providerConfigRef:
    name: default
    kind: ProviderConfig
---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: NetworkSecurityGroupSecurityRule
metadata:
  name: kazimierz-akn-nsg-ingress-tcp22-ipv6
  namespace: kazimierz-akn
spec:
  forProvider:
    networkSecurityGroupIdRef:
      name: kazimierz-akn-nsg
    direction: INGRESS
    protocol: "6"
    source: "::/0"
    sourceType: CIDR_BLOCK
    tcpOptions:
      - destinationPortRange:
          - min: 22
            max: 22
  providerConfigRef:
    name: default
    kind: ProviderConfig
---
# TCP/80 — HTTP → HTTPS redirect
apiVersion: networking.oci.m.upbound.io/v1alpha1

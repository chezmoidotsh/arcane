---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: NetworkSecurityGroupSecurityRule
metadata:
  name: kazimierz-akn-nsg-egress-tcp-ipv4
  namespace: kazimierz-akn
spec:
  forProvider:
    destination: 0.0.0.0/0
    destinationType: CIDR_BLOCK
    direction: EGRESS
    networkSecurityGroupIdRef:
      name: kazimierz-akn-nsg
    protocol: "6"
  providerConfigRef:
    kind: ProviderConfig
    name: default

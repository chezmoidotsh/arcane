---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: NetworkSecurityGroupSecurityRule
metadata:
  name: kazimierz-akn-nsg-ingress-tcp22-ipv6
  namespace: kazimierz-akn
spec:
  forProvider:
    direction: INGRESS
    networkSecurityGroupIdRef:
      name: kazimierz-akn-nsg
    protocol: "6"
    source: ::/0
    sourceType: CIDR_BLOCK
    tcpOptions:
    - destinationPortRange:
      - max: 22
        min: 22
  providerConfigRef:
    kind: ProviderConfig
    name: default

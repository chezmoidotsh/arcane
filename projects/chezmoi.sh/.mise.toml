# =============================================================================
# chezmoi.sh Project Development Environment Configuration
# =============================================================================
# This mise configuration provides task automation for shared infrastructure
# management including TrueNAS automation, Omni machine classes, and
# distributing Pulumi-provisioned Cloudflare tokens to the LXC appliances.
#
# Usage:
#   mise run truenas:audit           # Extract current TrueNAS state (READ-ONLY)
#   mise run truenas:configure       # Configure TrueNAS system
#   mise run truenas:configure:dry-run  # Preview configuration changes
#   mise run ansible:install         # Install Ansible dependencies
#   mise run pulumi:cloudflare-token:observability  # Inject Pulumi's Cloudflare token into observability's SOPS secret
#   mise run pulumi:cloudflare-token:omni           # Inject Pulumi's Cloudflare token into omni's SOPS secret
#   mise run pulumi:cloudflare-token:oci-registry   # Inject Pulumi's Cloudflare token into oci-registry's SOPS secret
#   mise run pulumi:tailscale-oauth:observability   # Inject Pulumi's Tailscale OAuth key into observability's SOPS secret
#
# Prerequisites:
#   - SSH key-based access to nas.chezmoi.sh as root user
#   - Ansible installed (configured in root .mise.toml)
#   - Pulumi CLI configured for the chezmoi.sh stack (see
#     src/infrastructure/pulumi/.mise.toml) and sops + age key in
#     SOPS_AGE_KEY_FILE (configured in root .mise.toml), for the
#     pulumi:cloudflare-token:* tasks
# =============================================================================

# =============================================================================
# Tasks definition
# =============================================================================

# -----------------------------------------------------------------------------
# Ansible Task Automation
# -----------------------------------------------------------------------------
# Tasks for TrueNAS infrastructure management using Ansible playbooks
# All operations are performed via SSH connection to nas.chezmoi.sh

[tasks."ansible:install"]
description = "Install Ansible requirements and collections"
run = "ansible-galaxy install -r {{ config_root }}/src/infrastructure/ansible/requirements.yaml"

# -----------------------------------------------------------------------------
# TrueNAS Management Tasks
# -----------------------------------------------------------------------------

[tasks."ansible:truenas"]
description = "Configure TrueNAS system settings, datasets, users, and shares"
dir = "{{ config_root }}/src/infrastructure/ansible"
run = "ansible-playbook -i inventory/production.yaml truenas.yaml"

[tasks."ansible:truenas:dry-run"]
description = "Perform a dry run of TrueNAS configuration (shows changes without applying)"
dir = "{{ config_root }}/src/infrastructure/ansible"
run = "ansible-playbook -i inventory/production.yaml truenas.yaml --check --diff --verbose"
env = { ANSIBLE_CONFIG = "{{ config_root }}/src/infrastructure/ansible/ansible.cfg" }

[tasks."ansible:truenas:audit"]
description = "Extract current TrueNAS configuration state (READ-ONLY operation)"
dir = "{{ config_root }}/src/infrastructure/ansible"
run = "ansible-playbook -i inventory/production.yaml truenas-audit.yaml"

# -----------------------------------------------------------------------------
# Omni Machine Class Management
# -----------------------------------------------------------------------------
# Declarative Talos machine classes applied to the Omni instance at
# omni.chezmoi.sh via omnictl. Definitions live in
# src/infrastructure/omni/machineclasses/ (see that README for the catalog).

[tasks."omni:machineclass:diff"]
description = "Preview machine class changes against Omni (dry-run, READ-ONLY)"
run = "omnictl apply --dry-run --file {{ config_root }}/src/infrastructure/omni/machineclasses"

[tasks."omni:machineclass:apply"]
description = "Apply all Talos machine classes to the Omni instance"
run = "omnictl apply --file {{ config_root }}/src/infrastructure/omni/machineclasses"

[tasks."omni:machineclass:list"]
description = "List machine classes currently registered in Omni (READ-ONLY)"
run = "omnictl get machineclasses"

# -----------------------------------------------------------------------------
# Cloudflare Token Retrieval — Pulumi to LXC SOPS secrets
# -----------------------------------------------------------------------------
# Cloudflare DNS-01 tokens for the LXC appliances (observability, omni,
# oci-registry) are created by the Pulumi stack in src/infrastructure/pulumi/,
# not pushed to Vault: this stack runs upstream of any Kubernetes cluster, so
# Vault (which itself lives inside amiya.akn) can't be a dependency here. Each
# token only exists as a Pulumi stack output.
#
# The observability appliance also needs a Tailscale OAuth key (for its
# caddy-tailscale tsnet), fetched by the pulumi:tailscale-oauth:observability
# task below. observability's lxc:secrets:sync calls both the Cloudflare and
# Tailscale retrieval tasks.
#
# These tasks fetch that output (`pulumi stack output --show-secrets`) and
# write it into the target LXC's secrets/caddy.sops.env with `sops set`, which
# updates only the target key and leaves every other key in that file
# untouched.
#
# Run one of these after `pulumi up` (or after rotating a token with `pulumi
# up --replace`), then rebuild/redeploy the LXC to pick up the new value.

[tasks."pulumi:cloudflare-token:observability"]
description = "Fetch the observability LXC's Cloudflare token from Pulumi and inject it into its SOPS secret"
dir = "{{ config_root }}/src/infrastructure/pulumi"
run = '''
  set -euo pipefail
  TOKEN=$(pulumi stack output observabilityDns01Token --show-secrets)
  [[ -n "${TOKEN}" ]] || { echo "[ERROR] Empty token — did 'pulumi up' run?" >&2; exit 1; }
  sops set --input-type dotenv --output-type dotenv \
    "{{ config_root }}/src/infrastructure/proxmox/lxc/observability/secrets/caddy.sops.env" \
    '["CLOUDFLARE_API_TOKEN"]' "\"${TOKEN}\""
  echo "[SUCCESS] CLOUDFLARE_API_TOKEN updated in observability/secrets/caddy.sops.env" >&2
'''

[tasks."pulumi:tailscale-oauth:observability"]
description = "Fetch the observability LXC's Tailscale OAuth key from Pulumi and inject it into its SOPS secret"
dir = "{{ config_root }}/src/infrastructure/pulumi"
run = '''
  set -euo pipefail
  KEY=$(pulumi stack output observabilityTailscaleOauthKey --show-secrets)
  [[ -n "${KEY}" ]] || { echo "[ERROR] Empty key — did 'pulumi up' run?" >&2; exit 1; }
  sops set --input-type dotenv --output-type dotenv \
    "{{ config_root }}/src/infrastructure/proxmox/lxc/observability/secrets/caddy.sops.env" \
    '["TAILSCALE_OAUTH_KEY"]' "\"${KEY}\""
  echo "[SUCCESS] TAILSCALE_OAUTH_KEY updated in observability/secrets/caddy.sops.env" >&2
'''

[tasks."pulumi:cloudflare-token:omni"]
description = "Fetch the omni LXC's Cloudflare token from Pulumi and inject it into its SOPS secret"
dir = "{{ config_root }}/src/infrastructure/pulumi"
run = '''
  set -euo pipefail
  TOKEN=$(pulumi stack output omniDns01Token --show-secrets)
  [[ -n "${TOKEN}" ]] || { echo "[ERROR] Empty token — did 'pulumi up' run?" >&2; exit 1; }
  sops set --input-type dotenv --output-type dotenv \
    "{{ config_root }}/src/infrastructure/proxmox/lxc/omni/secrets/caddy.sops.env" \
    '["CLOUDFLARE_API_TOKEN"]' "\"${TOKEN}\""
  echo "[SUCCESS] CLOUDFLARE_API_TOKEN updated in omni/secrets/caddy.sops.env" >&2
'''

[tasks."pulumi:cloudflare-token:oci-registry"]
description = "Fetch the oci-registry LXC's Cloudflare token from Pulumi and inject it into its SOPS secret"
dir = "{{ config_root }}/src/infrastructure/pulumi"
run = '''
  set -euo pipefail
  TOKEN=$(pulumi stack output zotRegistryDns01Token --show-secrets)
  [[ -n "${TOKEN}" ]] || { echo "[ERROR] Empty token — did 'pulumi up' run?" >&2; exit 1; }
  sops set --input-type dotenv --output-type dotenv \
    "{{ config_root }}/src/infrastructure/proxmox/lxc/oci-registry/secrets/caddy.sops.env" \
    '["CLOUDFLARE_API_TOKEN"]' "\"${TOKEN}\""
  echo "[SUCCESS] CLOUDFLARE_API_TOKEN updated in oci-registry/secrets/caddy.sops.env" >&2
'''

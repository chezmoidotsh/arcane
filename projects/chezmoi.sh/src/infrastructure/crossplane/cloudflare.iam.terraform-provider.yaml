# Cloudflare API Token for Terraform provider
#
# Description:
#   This resource creates a Cloudflare API Token with specific permissions for the
#   Terraform provider to manage security configurations (WAF, rate limiting, zone settings).
#
# Permissions (least-privilege, split by resource type):
#   Zone scope → Zone Read + Zone DNS Edit + Zone Settings Edit + Zone WAF Edit
#     scoped to zone 2734d7b22cf00222046320ed3187cb94 (chezmoi.sh) only
#   Account scope → Account Settings Read + Account Rulesets Write
#     scoped to account 00736631322131f61ce95f2c235143da only
#
# Security:
#   Two-policy split prevents zone-level permission groups from reaching account
#   resources (and vice versa). The connection secret lands in the chezmoi-sh
#   namespace and is synchronized to Vault (vault.chezmoi.sh) via the co-located
#   PushSecret.
---
apiVersion: account.upjet-cloudflare.m.upbound.io/v1alpha1
kind: Token
metadata:
  name: chezmoi-sh-terraform-provider
  namespace: chezmoi-sh
spec:
  forProvider:
    name: (chezmoi.sh) - terraform-provider
    accountId: 00736631322131f61ce95f2c235143da
    policies:
      - effect: allow
        permissionGroups:
          - id: c8fed203ed3043cba015a93ad1616f1f # Zone Read (Zone)
          - id: 4755a26eedb94da69e1066d98aa820be # Zone DNS Edit (Zone)
          - id: 3030687196b94b638145a3953da2b699 # Zone Settings Edit (Zone)
          - id: fb6778dc191143babbfaa57993f1d275 # Zone WAF Edit (Zone)
        resources: '{"com.cloudflare.api.account.zone.2734d7b22cf00222046320ed3187cb94":"*"}'
      - effect: allow
        permissionGroups:
          - id: c1fde68c7bcc44588cbb6ddbc16d6480 # Account Settings Read (Account)
          - id: 56907406c3d548ed902070ec4df0e328 # Account Rulesets Write (Account)
        resources: '{"com.cloudflare.api.account.00736631322131f61ce95f2c235143da":"*"}'
  writeConnectionSecretToRef:
    name: chezmoi.sh-cloudflare-token-terraform-provider
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: chezmoi.sh-cloudflare-token-terraform-provider
  namespace: chezmoi-sh
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: vault.chezmoi.sh
  selector:
    secret:
      name: chezmoi.sh-cloudflare-token-terraform-provider
  template:
    metadata:
      annotations:
        description: Cloudflare API Token for Terraform provider
        origin: crossplane
        owner: chezmoi.sh
        renewal-process: |
          Remove the chezmoi-sh-terraform-provider Token then wait ArgoCD to create a new one.
  data:
    - conversionStrategy: None
      match:
        secretKey: attribute.value
        remoteRef:
          remoteKey: shared/data/third-parties/cloudflare/iam/chezmoi.sh/terraform-provider
          property: api_token

# Cloudflare API Token for Caddy DNS-01 (zot-registry)
#
# Description:
#   This resource creates a Cloudflare API Token scoped to DNS management on
#   the chezmoi.sh zone, used by Caddy in the zot-registry LXC to obtain TLS
#   certificates via DNS-01 ACME challenge (cloudflare-dns plugin).
#
# Permissions:
#   - Zone Read: Enumerate zones to resolve the chezmoi.sh zone ID
#   - Zone DNS Edit: Create and delete TXT records for ACME challenge validation
#
# Security:
#   Scoped to the chezmoi.sh zone only. No account-level or write permissions
#   beyond DNS records. The generated token is stored as a Kubernetes Secret in
#   the crossplane-secrets namespace; retrieve it with:
#     kubectl get secret -n crossplane-secrets chezmoi.sh-cloudflare-token-caddy-dns01-zot \
#       -o jsonpath='{.data.attribute\.value}' | base64 -d
---
apiVersion: account.cloudflare.crossplane.io/v1alpha1
kind: APIToken
metadata:
  name: chezmoi-sh-caddy-dns01-zot
spec:
  forProvider:
    name: (chezmoi.sh) - caddy-dns01/zot-registry
    policy:
      - effect: allow
        permissionGroups:
          - c8fed203ed3043cba015a93ad1616f1f # Zone Read (Zone)
          - 4755a26eedb94da69e1066d98aa820be # Zone DNS Edit (Zone)
        resources:
          com.cloudflare.api.account.zone.2734d7b22cf00222046320ed3187cb94: "*"
  writeConnectionSecretToRef:
    name: chezmoi.sh-cloudflare-token-caddy-dns01-zot
    namespace: crossplane-secrets

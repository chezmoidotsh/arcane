# Cloudflare API Token for Caddy DNS-01 (omni)
#
# Description:
#   This resource creates a Cloudflare API Token scoped to DNS management on
#   the chezmoi.sh zone, used by Caddy in the omni LXC to obtain TLS
#   certificates via DNS-01 ACME challenge (cloudflare-dns plugin).
#
# Permissions:
#   Zone scope → Zone Read + Zone DNS Edit
#     scoped to zone 2734d7b22cf00222046320ed3187cb94 (chezmoi.sh) only
#
# Security:
#   No account-level permissions. The connection secret lands in the
#   chezmoi-sh namespace; retrieve it with:
#     kubectl get secret -n chezmoi-sh chezmoi.sh-cloudflare-token-caddy-dns01-omni \
#       -o jsonpath='{.data.attribute\.value}' | base64 -d
---
apiVersion: account.upjet-cloudflare.m.upbound.io/v1alpha1
kind: Token
metadata:
  name: chezmoi-sh-caddy-dns01-omni
  namespace: chezmoi-sh
spec:
  # Managed by Pulumi now (projects/chezmoi.sh/src/infrastructure/pulumi/) — observe
  # only, don't reconcile or delete.
  managementPolicies: ["Observe"]
  forProvider:
    name: (chezmoi.sh) - caddy-dns01/omni
    accountId: 00736631322131f61ce95f2c235143da
    policies:
      - effect: allow
        permissionGroups:
          - id: c8fed203ed3043cba015a93ad1616f1f # Zone Read (Zone)
          - id: 4755a26eedb94da69e1066d98aa820be # Zone DNS Edit (Zone)
        resources: '{"com.cloudflare.api.account.zone.2734d7b22cf00222046320ed3187cb94":"*"}'
  writeConnectionSecretToRef:
    name: chezmoi.sh-cloudflare-token-caddy-dns01-omni

# =============================================================================
# chezmoi.sh Pulumi stack - Mise configuration
# =============================================================================
# Shared cloud infrastructure for chezmoi.sh, managed as a Pulumi stack (state
# in the Garage S3 backend, see Pulumi.yaml).
#
# No stack exists yet — `pulumi stack init <name>` plus `pulumi config set
# --secret cloudflare_account_id/cloudflare_zone_id` come first. Once a stack
# exists, mirror amiya.akn's `.mise/env.yaml` (SOPS-encrypted
# PULUMI_STACK/PULUMI_CONFIG_PASSPHRASE, loaded via `[env] _.file` below) so
# these tasks don't prompt.
#
# `node = "24"` (fuzzy, not an exact patch) overrides the root .mise.toml's
# exact `24.16.0` pin — that specific patch's built-in TypeScript stripping
# refuses .ts files under any node_modules path, breaking the file:-linked
# catalog packages; a later 24.x patch fixed it, so pin loosely instead of to
# a specific version, mirroring amiya.akn's .mise.toml.
# =============================================================================

[tools]
node = "24"

[env]
_.file = "{{ config_root }}/.mise/env.yaml"

[tasks."pulumi:diff"]
description = "Preview pending changes for the chezmoi.sh Pulumi stack (with diff)"
run = "pulumi preview --diff"
dir = "{{ config_root }}"

[tasks."pulumi:apply"]
description = "Apply pending changes to the chezmoi.sh Pulumi stack, then regenerate TrueNAS docs"
depends_post = ["truenas:docs:generate"]
run = ["pulumi up"]
dir = "{{ config_root }}"

[tasks."truenas:docs:generate"]
description = "Regenerate projects/chezmoi.sh/docs/TRUENAS.md from the live chezmoi.sh Pulumi stack state"
run = "pnpm exec ts-node src/truenas-docs/generate.ts"
dir = "{{ config_root }}"

# ─────────────────────────────────────────────────────────────────────────────
# Vector sources — ingest log streams from multiple protocols
# ─────────────────────────────────────────────────────────────────────────────
# Three ingest paths:
#
#   syslog TCP  :5140  — PVE host / LXC log forwarding via rsyslog omfwd
#                        Restricted to the bridge network by the NixOS firewall
#                        and the Proxmox host firewall (source CIDR).
#
#   OTLP HTTP   :4318  — OpenTelemetry-native ingest (loopback only).
#                        Exposed publicly via Caddy /logs/otlp/* → TLS.
#                        Accepts OTLP logs/v1 protobuf or JSON.
#
#   Vector native :6000 — Vector-to-Vector native protocol (loopback only).
#                         Intended for cluster-side Vector agents sending
#                         pre-formatted SemConv loki-like events.
#                         Expose externally via Caddy h2c if needed.
# ─────────────────────────────────────────────────────────────────────────────
sources:
  in_syslog:
    type: syslog
    mode: tcp
    address: "0.0.0.0:5140"
    max_length: 102400

  in_otlp:
    type: opentelemetry
    grpc:
      address: "127.0.0.1:4317"
    http:
      address: "127.0.0.1:4318"

  in_vector:
    type: vector
    address: "127.0.0.1:6000"
    version: "2"

  # ─────────────────────────────────────────────────────────────────────────────
  # Vector self-observability — internal metrics source
  # ─────────────────────────────────────────────────────────────────────────────
  # Emits Vector's own component metrics every 30s: events received/sent per
  # component, errors, buffer sizes. Wired to the prometheus_remote_write sink
  # (see sinks.yaml) so VictoriaMetrics receives them alongside the rest of the
  # o11y-appliance stack.
  # ─────────────────────────────────────────────────────────────────────────────
  in_internal_metrics:
    type: internal_metrics
    scrape_interval_secs: 30
    # The `tags` block on internal_metrics only accepts host_key / pid_key in
    # Vector 0.55+. To attach external_labels like cluster=o11y-appliance, use
    # the tag_internal_metrics remap transform (config/vector/transforms.enrich.yaml).

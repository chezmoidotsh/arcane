# ─────────────────────────────────────────────────────────────────────────────
# Transform: JSON log parsing (syslog pipeline only)
# ─────────────────────────────────────────────────────────────────────────────
# Parses structured JSON logs embedded in _msg for known services arriving via
# the syslog pipeline. Each service emits JSON to stdout/stderr, captured by
# journald → rsyslog → Vector. This transform extracts the structured fields
# and maps them to OTLP semantic conventions.
#
# Supported services (by service.name / syslog appname):
#   caddy           → Caddy reverse proxy (regular + access logs)
#   victoriametrics → VictoriaMetrics TSDB
#   victorialogs    → VictoriaLogs log store
#   victoriatraces  → VictoriaTraces tracing store
#   vmalert         → vmalert rule evaluator
#   alertmanager    → Alertmanager notification hub
#
# OTLP field mapping:
#   JSON level/lvl            → attr.log.severity.text     (lowercased)
#   JSON msg/message          → _msg                        (replaces raw JSON)
#   JSON logger               → attr.log.logger.name
#   JSON caller/source        → attr.log.source.file
#   JSON component            → attr.component              (alertmanager)
#   JSON elapsed              → attr.elapsed                (alertmanager)
#
# Caddy access log HTTP fields (when request object is present):
#   request.method            → attr.http.request.method
#   request.uri               → attr.url.path + attr.url.query
#   request.proto             → attr.network.protocol.name + version
#   request.host              → attr.server.address
#   request.client_ip         → attr.client.address
#   status                    → attr.http.response.status_code
#   size                      → attr.http.response.body.size
#   bytes_read                → attr.http.request.body.size
#   duration                  → attr.http.request.duration
#
# Scope: syslog pipeline ONLY. OTLP and Vector-native events bypass this
# transform entirely (wired after syslog_to_semconv, before validate_semconv).
# ─────────────────────────────────────────────────────────────────────────────
transforms:
  parse_syslog_json:
    type: remap
    inputs:
      - syslog_to_semconv
    source: |
      known_json_services = [
        "caddy", "victoriametrics", "victorialogs",
        "victoriatraces", "vmalert", "alertmanager"
      ]

      svc = string!(."service.name")

      if includes(known_json_services, svc) && starts_with(string!(._msg), "{") {
        parsed, err = parse_json(._msg)
        if err == null && is_object(parsed) {
          # ── Common fields ─────────────────────────────────────────────
          raw_level = parsed.level ?? parsed.lvl
          if raw_level != null {
            ."attr.log.severity.text" = downcase(string!(raw_level))
          }

          raw_msg = parsed.msg ?? parsed.message
          if raw_msg != null {
            ._msg = string!(raw_msg)
          }

          raw_logger = parsed.logger
          if raw_logger != null {
            ."attr.log.logger.name" = string!(raw_logger)
          }

          raw_caller = parsed.caller ?? parsed.source
          if raw_caller != null {
            ."attr.log.source.file" = string!(raw_caller)
          }

          # ── Caddy access log HTTP fields ──────────────────────────────
          req = parsed.request
          if is_object(req) {
            if req.method != null {
              ."attr.http.request.method" = string!(req.method)
            }

            if req.uri != null {
              uri_parts = split(string!(req.uri), "?")
              ."attr.url.path" = uri_parts[0]
              if length(uri_parts) > 1 {
                ."attr.url.query" = uri_parts[1]
              }
            }

            if req.proto != null {
              proto = string!(req.proto)
              if starts_with(proto, "HTTP/") {
                ."attr.network.protocol.name" = "http"
                version = slice(proto, 5)
                if version != "" {
                  ."attr.network.protocol.version" = version
                }
              }
            }

            if req.host != null {
              ."attr.server.address" = string!(req.host)
            }

            if req.client_ip != null {
              ."attr.client.address" = string!(req.client_ip)
            } else if req.remote_ip != null {
              ."attr.client.address" = string!(req.remote_ip)
            }
          }

          status_code = parsed.status
          if status_code != null {
            ."attr.http.response.status_code" = to_int!(status_code)
          }

          resp_size = parsed.size
          if resp_size != null {
            ."attr.http.response.body.size" = to_int!(resp_size)
          }

          req_size = parsed.bytes_read
          if req_size != null {
            ."attr.http.request.body.size" = to_int!(req_size)
          }

          req_duration = parsed.duration
          if req_duration != null {
            ."attr.http.request.duration" = to_float!(req_duration)
          }

          # ── Alertmanager-specific fields ──────────────────────────────
          am_component = parsed.component
          if am_component != null {
            ."attr.component" = string!(am_component)
          }

          am_elapsed = parsed.elapsed
          if am_elapsed != null {
            ."attr.elapsed" = string!(am_elapsed)
          }
        }
      }

# ─────────────────────────────────────────────────────────────────────────────
# Unit tests — parse_syslog_json
# ─────────────────────────────────────────────────────────────────────────────
tests:
  - name: "parse-json: caddy regular log extracts severity and message"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"level":"info","ts":1780685259.3606942,"logger":"tailscale","msg":"AuthLoop: state is Running; done"}'
          _time: "2026-06-05T18:47:00+00:00"
          "service.name": "caddy"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "AuthLoop: state is Running; done")
              assert_eq!(.["attr.log.severity.text"], "info")
              assert_eq!(.["attr.log.logger.name"], "tailscale")
              assert!(is_null(.["attr.http.request.method"]), "no HTTP fields on regular log")
              true

  - name: "parse-json: caddy access log extracts HTTP fields"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"level":"info","ts":1780685259.3606942,"logger":"http.log.access","msg":"handled request","request":{"method":"GET","uri":"/metrics/api/v1/write?step=30","proto":"HTTP/2.0","host":"o11y.chezmoi.sh","client_ip":"10.0.0.50"},"status":200,"size":1234,"duration":0.005}'
          _time: "2026-06-05T18:47:00+00:00"
          "service.name": "caddy"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "handled request")
              assert_eq!(.["attr.log.severity.text"], "info")
              assert_eq!(.["attr.http.request.method"], "GET")
              assert_eq!(.["attr.url.path"], "/metrics/api/v1/write")
              assert_eq!(.["attr.url.query"], "step=30")
              assert_eq!(.["attr.network.protocol.name"], "http")
              assert_eq!(.["attr.network.protocol.version"], "2.0")
              assert_eq!(.["attr.server.address"], "o11y.chezmoi.sh")
              assert_eq!(.["attr.client.address"], "10.0.0.50")
              assert_eq!(.["attr.http.response.status_code"], 200)
              assert_eq!(.["attr.http.response.body.size"], 1234)
              assert_eq!(.["attr.http.request.duration"], 0.005)
              true

  - name: "parse-json: victoriametrics log extracts caller and message"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"ts":"2026-06-05T18:47:34.035Z","level":"info","caller":"VictoriaMetrics/lib/promscrape/config.go:151","msg":"started 5 service discovery routines in 0.000 seconds"}'
          _time: "2026-06-05T18:47:34+00:00"
          "service.name": "victoriametrics"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "started 5 service discovery routines in 0.000 seconds")
              assert_eq!(.["attr.log.severity.text"], "info")
              assert_eq!(.["attr.log.source.file"], "VictoriaMetrics/lib/promscrape/config.go:151")
              true

  - name: "parse-json: vmalert log extracts caller and message"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"ts":"2026-06-05T18:47:34.035Z","level":"warn","caller":"vmalert/pkg/rules/config.go:42","msg":"rule group evaluation took 2.5s"}'
          _time: "2026-06-05T18:47:34+00:00"
          "service.name": "vmalert"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "rule group evaluation took 2.5s")
              assert_eq!(.["attr.log.severity.text"], "warn")
              assert_eq!(.["attr.log.source.file"], "vmalert/pkg/rules/config.go:42")
              true

  - name: "parse-json: alertmanager log extracts component and elapsed"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"time":"2026-06-05T18:47:43.879888902Z","level":"INFO","source":"cluster.go:699","msg":"gossip settled; proceeding","component":"cluster","elapsed":"10.002958886s"}'
          _time: "2026-06-05T18:47:43+00:00"
          "service.name": "alertmanager"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "gossip settled; proceeding")
              assert_eq!(.["attr.log.severity.text"], "info", "level INFO downcased")
              assert_eq!(.["attr.log.source.file"], "cluster.go:699", "source → source.file")
              assert_eq!(.["attr.component"], "cluster")
              assert_eq!(.["attr.elapsed"], "10.002958886s")
              true

  - name: "parse-json: unknown service passes through unchanged"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"level":"info","msg":"something"}'
          _time: "2026-06-05T18:47:00+00:00"
          "service.name": "sshd"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "{\"level\":\"info\",\"msg\":\"something\"}", "raw JSON preserved")
              assert!(is_null(.["attr.log.severity.text"]), "no extraction for unknown svc")
              true

  - name: "parse-json: non-JSON message passes through unchanged"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: "Started Caddy service"
          _time: "2026-06-05T18:47:00+00:00"
          "service.name": "caddy"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "Started Caddy service", "plain text preserved")
              assert!(is_null(.["attr.log.severity.text"]))
              true

  - name: "parse-json: caddy access log without query string"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"level":"info","ts":1780685259,"logger":"http.log.access","msg":"handled","request":{"method":"POST","uri":"/metrics/api/v1/write","proto":"HTTP/1.1","host":"o11y.chezmoi.sh","client_ip":"10.0.0.1"},"status":204,"size":0,"bytes_read":512,"duration":0.1}'
          _time: "2026-06-05T18:47:00+00:00"
          "service.name": "caddy"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(.["attr.url.path"], "/metrics/api/v1/write")
              assert!(is_null(.["attr.url.query"]), "no query string → no attr.url.query")
              assert_eq!(.["attr.http.request.body.size"], 512)
              assert_eq!(.["attr.http.response.status_code"], 204)
              true

  - name: "parse-json: victoria-logs log matches starts_with victoria"
    inputs:
      - insert_at: parse_syslog_json
        type: log
        log_fields:
          _msg: '{"ts":"2026-06-05T18:47:34.035Z","level":"info","caller":"VictoriaLogs/lib/logstorage/insert.go:42","msg":"inserted 100 records"}'
          _time: "2026-06-05T18:47:34+00:00"
          "service.name": "victorialogs"
          "host.name": "o11y"
    outputs:
      - extract_from: parse_syslog_json
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "inserted 100 records")
              assert_eq!(.["attr.log.severity.text"], "info")
              assert_eq!(.["attr.log.source.file"], "VictoriaLogs/lib/logstorage/insert.go:42")
              true

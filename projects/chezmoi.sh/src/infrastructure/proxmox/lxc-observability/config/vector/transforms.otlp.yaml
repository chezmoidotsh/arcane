# ─────────────────────────────────────────────────────────────────────────────
# Transform: OTLP → SemConv loki-like format
# ─────────────────────────────────────────────────────────────────────────────
# Normalizes the nested OTLP log record structure emitted by Vector's
# `opentelemetry` source into the flat VictoriaLogs loki-like SemConv layout.
#
#   Vector OTLP source output (log records):
#     .attributes.*              — log-level attributes (OTel LogRecord.attributes)
#     .resources.attributes.*   — resource attributes (OTel Resource.attributes)
#     .body                     — log body (OTel LogRecord.body)
#     .timestamp                — observed timestamp (RFC 3339)
#     .trace_id                 — trace ID (hex string)
#     .span_id                  — span ID (hex string)
#     .severity_number          — numeric severity
#     .severity_text            — severity label
#
#   After this transform events follow the VLogs loki-like convention:
#     _msg                       — log body
#     _time                      — event timestamp (RFC 3339)
#     attr.observed_timestamp    — OTLP-provided observed time, else now()
#     <resource.*>               — flattened from resources.attributes (at root)
#     attr.<key>                 — flattened from attributes (prefixed with "attr.")
#     trace_id                   — preserved
#     span_id                    — preserved
#     attr.log.severity.text     — severity_text
#     attr.log.severity.number   — severity_number
#
# NOTE: the exact field names produced by Vector's `opentelemetry` source may
# shift between Vector releases. Verify against `vector generate opentelemetry`
# output for the pinned version.
# ─────────────────────────────────────────────────────────────────────────────
transforms:
  otlp_to_semconv:
    type: remap
    inputs:
      - in_otlp.logs
    source: |
      # ── Observation timestamp ─────────────────────────────────────────────
      # OTLP carries observed_timestamp natively (set by the originating SDK).
      # Preserve it if present; otherwise stamp with now() — this is when our
      # Vector OTLP source received the event.
      obs = del(.observed_timestamp)
      if obs != null {
        ."attr.observed_timestamp" = format_timestamp!(obs, format: "%+")
      } else {
        ."attr.observed_timestamp" = format_timestamp!(now(), format: "%+")
      }

      # ── Core VLogs fields ─────────────────────────────────────────────────
      ._msg  = string(del(.body)) ?? ""
      ._time = format_timestamp!(del(.timestamp) || now(), format: "%+")

      # ── Resource attributes → root level ──────────────────────────────────
      resource_attrs = object(del(.resources.attributes)) ?? {}
      . = merge!(., resource_attrs)
      del(.resources)

      # ── Log attributes → attr.* prefix ────────────────────────────────────
      log_attrs = object(del(.attributes)) ?? {}
      prefixed_attrs = map_keys(log_attrs) -> |key| { "attr." + key }
      . = merge!(., prefixed_attrs)

      # ── Severity → attr.log.severity.* ───────────────────────────────────
      sev_text = del(.severity_text)
      if sev_text != null {
        ."attr.log.severity.text" = to_string!(sev_text)
      }

      sev_num = del(.severity_number)
      if sev_num != null {
        ."attr.log.severity.number" = to_string!(sev_num)
      }

      # ── Cleanup — drop remaining OTLP envelope fields ─────────────────────
      del(.flags)
      del(.source_type)

# ─────────────────────────────────────────────────────────────────────────────
# Unit tests — otlp_to_semconv
# ─────────────────────────────────────────────────────────────────────────────
tests:
  - name: "otlp: full event with resource + log attributes maps to SemConv"
    inputs:
      - insert_at: otlp_to_semconv
        type: log
        log_fields:
          body: "Request handled in 42ms"
          timestamp: "2024-03-10T14:00:00+00:00"
          trace_id: "abc123def456abc1"
          span_id: "aabbccdd"
          severity_text: "INFO"
          severity_number: 9
          flags: 1
          observed_timestamp: "2024-03-10T14:00:00.001+00:00"
          resources:
            attributes:
              service.name: "api-gateway"
              host.name: "k8s-node-01"
              k8s.namespace.name: "production"
              k8s.pod.name: "api-gateway-7d9f"
          attributes:
            http.method: "GET"
            http.route: "/api/v1/users"
            http.status_code: 200
    outputs:
      - extract_from: otlp_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "Request handled in 42ms")
              assert!(starts_with(string!(._time), "2024-03-10"))
              assert_eq!(.["service.name"], "api-gateway")
              assert_eq!(.["host.name"], "k8s-node-01")
              assert_eq!(.["k8s.namespace.name"], "production")
              assert_eq!(.["k8s.pod.name"], "api-gateway-7d9f")
              assert_eq!(.["attr.http.method"], "GET")
              assert_eq!(.["attr.http.route"], "/api/v1/users")
              assert_eq!(.trace_id, "abc123def456abc1")
              assert_eq!(.span_id, "aabbccdd")
              assert_eq!(.["attr.log.severity.text"], "INFO")
              assert_eq!(.["attr.log.severity.number"], "9")
              true

  - name: "otlp: observed_timestamp preserved from OTLP envelope"
    inputs:
      - insert_at: otlp_to_semconv
        type: log
        log_fields:
          body: "msg"
          timestamp: "2024-06-01T10:00:00+00:00"
          observed_timestamp: "2024-06-01T10:00:00.500+00:00"
          resources:
            attributes:
              service.name: "svc"
    outputs:
      - extract_from: otlp_to_semconv
        conditions:
          - type: vrl
            source: |
              obs = string!(.["attr.observed_timestamp"])
              # OTLP sender's timestamp must round-trip (sub-second precision preserved)
              assert!(starts_with(obs, "2024-06-01T10:00:00"), "OTLP observed_timestamp preserved")
              true

  - name: "otlp: observed_timestamp stamped with now() when OTLP omits it"
    inputs:
      - insert_at: otlp_to_semconv
        type: log
        log_fields:
          body: "msg"
          timestamp: "2024-06-01T10:00:00+00:00"
          resources:
            attributes:
              service.name: "svc"
    outputs:
      - extract_from: otlp_to_semconv
        conditions:
          - type: vrl
            source: |
              obs = string!(.["attr.observed_timestamp"])
              parsed = parse_timestamp!(obs, format: "%+")
              assert!(parsed != null, "fallback observed_timestamp is RFC3339")
              true

  - name: "otlp: raw OTLP envelope fields removed after normalization"
    inputs:
      - insert_at: otlp_to_semconv
        type: log
        log_fields:
          body: "msg"
          timestamp: "2024-01-01T00:00:00Z"
          severity_text: "WARN"
          severity_number: 13
          flags: 0
          observed_timestamp: "2024-01-01T00:00:00.001Z"
          resources:
            attributes:
              service.name: "svc"
          attributes:
            custom.key: "val"
    outputs:
      - extract_from: otlp_to_semconv
        conditions:
          - type: vrl
            source: |
              forbidden = ["body", "severity_text", "severity_number", "flags",
                           "observed_timestamp", "resources", "attributes"]
              all_keys = keys(.)
              leftovers = filter(forbidden) -> |_i, k| { includes(all_keys, k) }
              assert_eq!(leftovers, [], "no raw OTLP envelope fields at root")
              true

  - name: "otlp: missing optional fields produce no null attrs"
    inputs:
      - insert_at: otlp_to_semconv
        type: log
        log_fields:
          body: "minimal event"
          resources:
            attributes:
              service.name: "minimal-svc"
    outputs:
      - extract_from: otlp_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(._msg, "minimal event")
              assert_eq!(.["service.name"], "minimal-svc")
              assert!(is_null(.["attr.log.severity.text"]))
              assert!(is_null(.["attr.log.severity.number"]))
              assert!(is_null(.trace_id))
              true

  - name: "otlp: empty resources and attributes leave clean root"
    inputs:
      - insert_at: otlp_to_semconv
        type: log
        log_fields:
          body: "no resources"
          resources:
            attributes: {}
          attributes: {}
    outputs:
      - extract_from: otlp_to_semconv
        conditions:
          - type: vrl
            source: |
              all_keys = keys(.)
              assert!(!includes(all_keys, "resources"))
              assert!(!includes(all_keys, "attributes"))
              true

# First routing stage: dispatch journald events by service name.
# Service-specific parsers take their inputs from route_by_service.<key>.
# Unrecognised services pass through to the sink unchanged.
transforms:
  route_by_service:
    type: route
    inputs:
      - journald_to_semconv
    route:
      provider: '.resources."service.name" == "omni-infra-provider-proxmox"'

  unmatched_to_o11y:
    type: filter
    inputs:
      - route_by_service._unmatched
    condition:
      type: vrl
      source: "true"

tests:
  - name: "route: non-provider service passes through unmatched_to_o11y unchanged"
    inputs:
      - insert_at: unmatched_to_o11y
        type: log
        log_fields:
          body: "other service log"
          timestamp: "2026-06-13T00:00:00Z"
          observed_timestamp: "2026-06-13T00:00:00Z"
          resources."service.name": caddy
          resources."host.name": omni-infra-provider-proxmox
    outputs:
      - extract_from: unmatched_to_o11y
        conditions:
          - type: vrl
            source: |
              assert_eq!(.body, "other service log")
              assert_eq!(."resources"."service.name", "caddy")
              true

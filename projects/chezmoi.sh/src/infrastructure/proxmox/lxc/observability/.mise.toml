# =============================================================================
# observability LXC — Task Automation
# =============================================================================
# Tasks for building, uploading, and maintaining the Proxmox LXC template that
# runs the VictoriaMetrics observability stack (o11y.chezmoi.sh) with Caddy
# HTTPS termination, path routing, and embedded Tailscale (caddy-tailscale).
#
# Usage:
#   mise run lxc:secrets:sync                       # Sync Pulumi tokens (Cloudflare + Tailscale); preserves Alertmanager URLs
#   mise run lxc:build                              # Build the LXC tarball with all secrets baked in
#   mise run lxc:push -- <pve-host>                 # Upload template to Proxmox (local storage)
#   mise run lxc:upgrade -- <pve-host> --vmid <vmid>  # Upgrade a running LXC in place
#
# Secret files (both SOPS/age-encrypted, baked into the image at build time):
#   secrets/caddy.sops.env          CLOUDFLARE_API_TOKEN          (Pulumi — DNS-01 ACME)
#                                   TAILSCALE_OAUTH_KEY           (Pulumi — caddy-tailscale tsnet, tag:o11y)
#   secrets/observability.sops.env  SLACK_WEBHOOK_URL             (operator-provided — Slack incoming webhook)
#                                   ALERTMANAGER_DEADMAN_URL      (operator-provided — external heartbeat URL)
#
# There is no ingest/query auth — access control is the Proxmox host firewall
# (source CIDR) plus the tailnet. No vmauth credentials to distribute (ADR-013).
#
# File-based tasks (bash scripts):
#   .mise/tasks/lxc/build    — build task
#   .mise/tasks/lxc/push     — upload task
#   .mise/tasks/lxc/upgrade  — upgrade task
#
# Prerequisites:
#   - Docker (for the Nix build container)
#   - Pulumi CLI logged into the chezmoi.sh stack (see src/infrastructure/pulumi/.mise.toml); run pulumi up first
#   - sops + age key in SOPS_AGE_KEY_FILE (configured in root .mise.toml)
#   - SSH key-based access to root@<pve-host> (for lxc:push)
# =============================================================================

# -----------------------------------------------------------------------------
# Secret Management — Pulumi tokens (Cloudflare DNS-01 + Tailscale OAuth)
# -----------------------------------------------------------------------------
# Delegates to the pulumi:cloudflare-token:observability and
# pulumi:tailscale-oauth:observability tasks (defined in the chezmoi.sh
# project .mise.toml), which fetch Pulumi stack outputs and write them into
# caddy.sops.env. Both tokens share the same secrets file since both are
# consumed exclusively by the Caddy process.
#
# Alertmanager URLs in observability.sops.env are preserved (operator-set,
# never touched by Pulumi).
#
# NOTE: requires `pulumi up` to have run in src/infrastructure/pulumi so the
# stack outputs exist.

[tasks."lxc:secrets:sync"]
description = "Sync Pulumi tokens (Cloudflare + Tailscale) into secrets/caddy.sops.env"
dir = "{{ config_root }}"
run = '''
  set -euo pipefail
  mise run pulumi:cloudflare-token:observability
  mise run pulumi:tailscale-oauth:observability
  echo "[SUCCESS] caddy.sops.env synced from Pulumi (Cloudflare + Tailscale)." >&2
  echo "[NOTE] observability.sops.env (Slack webhook + deadman URL) is operator-managed and untouched." >&2
'''

# -----------------------------------------------------------------------------
# Vector configuration tests
# -----------------------------------------------------------------------------
# Validates and unit-tests the Vector pipeline configuration without starting
# a live Vector instance. Requires `vector` on PATH (install from https://vector.dev).
#
#   mise run vector:validate   — syntax check all production YAML files
#   mise run vector:test       — run all unit tests + e2e pipeline tests

[tasks."vector:validate"]
description = "Validate Vector config syntax and component graph (all files)"
dir = "{{ config_root }}"
run = '''
  set -euo pipefail
  vector validate --no-environment --config-dir config/vector
  echo "[OK] Vector config validated."
'''

[tasks."vector:test"]
description = "Run all inline Vector tests (unit per transform + e2e pipeline)"
dir = "{{ config_root }}"
run = '''
  set -euo pipefail
  # Tests are inline in each transform file (10-/15-/20-/30-) and in the
  # dedicated pipeline test file (50-tests-pipeline.yaml). --config-dir loads
  # all *.yaml files and runs every `tests:` section found.
  vector test --config-dir config/vector
  echo "[OK] All Vector tests passed."
'''

# -----------------------------------------------------------------------------
# Deployment Tasks — see .mise/tasks/lxc/ for file-based scripts
# -----------------------------------------------------------------------------
# lxc:build   → .mise/tasks/lxc/build   (build LXC tarball with all secrets baked in)
# lxc:push    → .mise/tasks/lxc/push    (upload template to Proxmox)
# lxc:upgrade → .mise/tasks/lxc/upgrade (in-place rootfs-swap upgrade, same VMID)

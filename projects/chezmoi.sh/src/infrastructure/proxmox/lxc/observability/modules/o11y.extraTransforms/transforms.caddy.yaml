# Parse Caddy JSON logs → OTLP-style.
#
# Format: {"level":"info","ts":1234567890.123,"logger":"tailscale","msg":"..."}
#   ts is a Unix float (seconds since epoch), NOT RFC3339 — Caddy-specific.
#   Access logs add: request{}, duration, size, status.
#
# OTLP-style mapping (enriches existing event in-place):
#   msg      → body                        (startup/info logs)
#   request  → body (Apache CLF format)    (access logs)
#   level    → severity_number             (severity_text derived in to_vlogs_format)
#   logger   → attributes.log.logger.name  (OTel SemConv)
#   request  → attributes.caddy.request    (access-log only)
#   duration → attributes.caddy.duration   (access-log only)
#   size     → attributes.caddy.size       (access-log only)
#   status   → attributes.caddy.status     (access-log only)
transforms:
  caddy_to_o11y:
    type: remap
    inputs:
      - route_by_service.caddy
    drop_on_error: false
    source: |
      if is_string(.body) {
        parsed, _err = parse_json(.body)
        if _err == null && is_object(parsed) {
          # Message (default: use msg field)
          if exists(parsed.msg) { .body = to_string!(parsed.msg) }

          # Access logs: rewrite body as Apache Combined Log Format
          if exists(parsed.request) && is_object(parsed.request) {
            _req     = object!(parsed.request)
            _remote  = string(get(_req, ["remote_ip"]) ?? null) ?? "-"
            _method  = string(get(_req, ["method"]) ?? null) ?? "-"
            _uri     = string(get(_req, ["uri"]) ?? null) ?? "-"
            _proto   = string(get(_req, ["proto"]) ?? null) ?? "HTTP/1.1"
            _status  = if exists(parsed.status) { to_string!(parsed.status) } else { "-" }
            _sz      = if exists(parsed.size) { to_int!(parsed.size) } else { 0 }
            _size    = if _sz > 0 { to_string!(_sz) } else { "-" }
            _hdrs    = object(get(_req, ["headers"]) ?? {}) ?? {}
            _ref_arr = get(_hdrs, ["Referer"]) ?? null
            _referer = if is_array(_ref_arr) { string(_ref_arr[0]) ?? "-" } else { "-" }
            _ua_arr  = get(_hdrs, ["User-Agent"]) ?? null
            _ua      = if is_array(_ua_arr) { string(_ua_arr[0]) ?? "-" } else { "-" }
            _ts_unix = if exists(parsed.ts) { to_int!(parsed.ts) } else { 0 }
            _ts_clf  = format_timestamp!(from_unix_timestamp!(_ts_unix), format: "%d/%b/%Y:%T %z")
            .body = _remote + " - - [" + _ts_clf + "] \"" + _method + " " + _uri + " " + _proto + "\" " + _status + " " + _size + " \"" + _referer + "\" \"" + _ua + "\""
          }

          # Severity — only severity_number; severity_text derived in to_vlogs_format
          if exists(parsed.level) {
            _level = downcase(to_string!(parsed.level))
            _sev = {
              "trace": 1, "debug": 5, "info": 9, "information": 10, "notice": 11,
              "warning": 13, "warn": 13, "error": 17,
              "critical": 21, "fatal": 21, "alert": 22, "emergency": 23, "panic": 24
            }
            .severity_number = get(_sev, [_level]) ?? 9
          }

          if !is_object(.attributes) { .attributes = {} }

          # logger → attributes.log.logger.name (OTel SemConv)
          if exists(parsed.logger) {
            .attributes.log.logger.name = to_string!(parsed.logger)
          }

          # Access-log structured fields (absent on startup / info logs)
          if exists(parsed.request)  { .attributes.caddy.request  = parsed.request  }
          if exists(parsed.duration) { .attributes.caddy.duration = parsed.duration }
          if exists(parsed.size)     { .attributes.caddy.size     = parsed.size     }
          if exists(parsed.status)   { .attributes.caddy.status   = parsed.status   }
        }
      }

tests:
  - name: "caddy: parse tailscale tsnet startup log (Unix float ts)"
    inputs:
      - insert_at: caddy_to_o11y
        type: log
        log_fields:
          body: '{"level":"info","ts":1780762408.0995722,"logger":"tailscale","msg":"tsnet starting with hostname \"o11y-ep\""}'
          timestamp: "2026-06-05T21:13:28.099Z"
          observed_timestamp: "2026-06-05T21:13:28.099Z"
          resources:
            service:
              name: caddy
            host:
              name: o11y
    outputs:
      - extract_from: caddy_to_o11y
        conditions:
          - type: vrl
            source: |
              assert_eq!(.body, "tsnet starting with hostname \"o11y-ep\"")
              assert_eq!(.severity_number, 9)
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              assert_eq!(.attributes.log.logger.name, "tailscale")

  - name: "caddy: error level maps to OTel severity 17"
    inputs:
      - insert_at: caddy_to_o11y
        type: log
        log_fields:
          body: '{"level":"error","ts":1780762408.0,"logger":"http","msg":"dial failed"}'
          timestamp: "2026-06-05T21:13:28.000Z"
          observed_timestamp: "2026-06-05T21:13:28.000Z"
          resources:
            service:
              name: caddy
            host:
              name: o11y
    outputs:
      - extract_from: caddy_to_o11y
        conditions:
          - type: vrl
            source: |
              assert_eq!(.severity_number, 17)
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              assert_eq!(.attributes.log.logger.name, "http")

  - name: "caddy: access log body is Apache Combined Log Format"
    inputs:
      - insert_at: caddy_to_o11y
        type: log
        log_fields:
          body: '{"level":"info","ts":1700000000.0,"logger":"http.log.access","msg":"handled request","request":{"remote_ip":"10.0.0.1","proto":"HTTP/2.0","method":"GET","uri":"/api/health?q=1","headers":{"User-Agent":["curl/8.0"],"Referer":["-"]}},"duration":0.001,"size":42,"status":200}'
          timestamp: "2023-11-14T22:13:20.000Z"
          observed_timestamp: "2023-11-14T22:13:20.001Z"
          resources:
            service:
              name: caddy
            host:
              name: o11y
    outputs:
      - extract_from: caddy_to_o11y
        conditions:
          - type: vrl
            source: |
              clf = string!(.body)
              assert!(contains(clf, "10.0.0.1 - - ["), "remote_ip and CLF bracket")
              assert!(contains(clf, "] \"GET /api/health?q=1 HTTP/2.0\" 200 42"), "method uri proto status size")
              assert!(contains(clf, "\"curl/8.0\""), "User-Agent")
              assert_eq!(.attributes.caddy.status, 200)
              assert_eq!(.attributes.caddy.size, 42)
              assert!(is_null(.severity_text))
              true

  - name: "caddy: non-JSON body passes through unchanged"
    inputs:
      - insert_at: caddy_to_o11y
        type: log
        log_fields:
          body: "plain startup line"
          timestamp: "2026-06-05T21:13:28.000Z"
          observed_timestamp: "2026-06-05T21:13:28.000Z"
          resources:
            service:
              name: caddy
            host:
              name: o11y
    outputs:
      - extract_from: caddy_to_o11y
        conditions:
          - type: vrl
            source: |
              assert_eq!(.body, "plain startup line")
              assert!(is_null(.severity_text))

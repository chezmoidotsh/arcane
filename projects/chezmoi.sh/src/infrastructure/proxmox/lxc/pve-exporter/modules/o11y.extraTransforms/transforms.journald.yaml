# Journald passthrough  (injected into catalog.lxcAgent via logs.extraTransforms)
#
# catalog.lxcAgent injects an automatic journald_to_o11y passthrough ONLY when
# logs.extraTransforms is empty. As soon as we add the syslog fragment the auto
# passthrough is omitted and the caller (us) owns wiring journald to the sink.
# This fragment restores it: journald_to_semconv (catalog's static journald
# source+remap) → journald_to_o11y → out_logs (via the `*_to_o11y` glob).
#
# A filter with `true` is the cleanest Vector passthrough — identical to the
# auto-generated component it replaces.

transforms:
  journald_to_o11y:
    type: filter
    inputs:
      - journald_to_semconv
    condition:
      type: vrl
      source: "true"

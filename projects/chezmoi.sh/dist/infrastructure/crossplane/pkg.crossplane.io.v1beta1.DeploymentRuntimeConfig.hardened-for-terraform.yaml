---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: hardened-for-terraform
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
          - env:
            - name: TF_PLUGIN_CACHE_DIR
              value: /tmp
            - name: XP_TF_DIR
              value: /tmp
            name: package-runtime
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              privileged: false
              readOnlyRootFilesystem: true
            volumeMounts:
            - mountPath: /tmp
              name: tmpdir
          securityContext:
            fsGroup: 48291
            runAsGroup: 48291
            runAsNonRoot: true
            runAsUser: 48291
            seccompProfile:
              type: RuntimeDefault
          volumes:
          - emptyDir: {}
            name: tmpdir

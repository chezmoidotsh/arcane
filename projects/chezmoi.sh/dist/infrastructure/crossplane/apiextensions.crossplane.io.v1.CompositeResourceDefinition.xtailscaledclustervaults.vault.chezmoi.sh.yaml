                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
              mountPoint:
                description: The OpenBao mount path for this cluster
                type: string
              roles:

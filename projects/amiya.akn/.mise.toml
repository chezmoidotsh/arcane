# =============================================================================
# Amiya.akn Cluster - Mise Configuration
# =============================================================================
# Project-specific mise configuration for the amiya.akn cluster.
# This cluster serves as the mission-critical infrastructure running on
# Talos Linux with ArgoCD for GitOps deployment.
#
# Services: OpenBao, Authelia, Core Infrastructure
# Architecture: Talos Linux + ArgoCD
# =============================================================================

[tasks."diagram:generate"]
description = "Generate the architecture diagram for amiya.akn cluster"
# Converts the D2 diagram source to SVG format for documentation
# Input: architecture.d2 (diagram-as-code source)
# Output: docs/assets/architecture.svg (embedded in cluster documentation)
run = "d2 architecture.d2 docs/assets/architecture.svg"
dir = "{{ config_root }}"

[tasks."sops:cnpg-backup-sync"]
description = "Sync CNPG backup credentials from Pulumi outputs to SOPS secrets"
dir = "src/infrastructure/pulumi"
run = """
  ACCESS_KEY=$(pulumi stack output --show-secrets garageBackupAccessKeyId)
  SECRET_KEY=$(pulumi stack output --show-secrets garageBackupSecretAccessKey)
  for f in \
    ../../src/apps/vault/cnpg.backup-credentials.secret.yaml \
    ../../src/apps/pocket-id/sops/cnpg.backup-credentials.secret.yaml
  do
    sops set -i "$f" 'stringData.access_key_id' "$ACCESS_KEY"
    sops set -i "$f" 'stringData.access_secret_key' "$SECRET_KEY"
    sops set -i "$f" 'stringData.endpoint_url' 'https://s3.chezmoi.sh'
    sops set -i "$f" 'stringData.region' 'fr-par-1'
  done
"""

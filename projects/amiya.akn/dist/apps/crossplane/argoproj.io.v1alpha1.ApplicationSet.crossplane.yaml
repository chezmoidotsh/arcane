---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  annotations:
    argocd.argoproj.io/description: |
      This ApplicationSet is responsible for automatically deploying all
      Crossplane resources inside the current cluster.
  labels:
    app.kubernetes.io/instance: crossplane
    app.kubernetes.io/name: crossplane
  name: crossplane
  namespace: argocd
spec:
  generators:
  - git:
      directories:
      - path: projects/*/src/infrastructure/crossplane
      repoURL: https://github.com/chezmoidotsh/arcane.git
      revision: main
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  ignoreApplicationDifferences:
  - jqPathExpressions:
    - .spec.source.targetRevision
    - .spec.sources[].targetRevision
    - .spec.syncPolicy.automated
  syncPolicy:
    preserveResourcesOnDeletion: true
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "100"
        source-ref.argocd.argoproj.io/0.path: '{{ .path.path }}'
        source-ref.argocd.argoproj.io/0.repository-url: https://github.com/chezmoidotsh/arcane.git
        source-ref.argocd.argoproj.io/0.target-revision: main
      name: crossplane-{{ index .path.segments 1 }}
    spec:
      destination:
        namespace: crossplane
        server: https://kubernetes.default.svc
      project: crossplane
      sources:
      - path: '{{ .path.path }}'
        repoURL: https://github.com/chezmoidotsh/arcane.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - Delete=confirm
        - Prune=confirm
        - ServerSideApply=true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: crossplane-rbac-manager
    app.kubernetes.io/component: cloud-infrastructure-controller
    app.kubernetes.io/instance: crossplane
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/version: 2.3.2
    helm.sh/chart: crossplane-2.3.2
    release: crossplane
  name: crossplane-rbac-manager
  namespace: crossplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crossplane-rbac-manager
      app.kubernetes.io/instance: crossplane
      app.kubernetes.io/name: crossplane
      release: crossplane
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: crossplane-rbac-manager
        app.kubernetes.io/component: cloud-infrastructure-controller
        app.kubernetes.io/instance: crossplane
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: crossplane
        app.kubernetes.io/part-of: crossplane
        app.kubernetes.io/version: 2.3.2
        helm.sh/chart: crossplane-2.3.2
        release: crossplane
    spec:
      containers:
      - args:
        - rbac
        - start
        - --provider-clusterrole=crossplane:allowed-provider-permissions
        env:
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: crossplane
              divisor: "1"
              resource: limits.cpu
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: crossplane
              divisor: "1"
              resource: limits.memory
        - name: LEADER_ELECTION
          value: "true"
        image: oci.chezmoi.sh/xpkg.crossplane.io/crossplane/crossplane:v2.3.2
        imagePullPolicy: IfNotPresent
        name: crossplane
        resources:
          limits:
            cpu: 100m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsUser: 65532
      initContainers:
      - args:
        - rbac
        - init
        env:
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: crossplane-init
              divisor: "1"
              resource: limits.cpu
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: crossplane-init
              divisor: "1"
              resource: limits.memory
        image: oci.chezmoi.sh/xpkg.crossplane.io/crossplane/crossplane:v2.3.2
        imagePullPolicy: IfNotPresent
        name: crossplane-init
        resources:
          limits:
            cpu: 100m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsUser: 65532
      securityContext:
        fsGroup: 31459
        runAsGroup: 31459
        runAsNonRoot: true
        runAsUser: 31459
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: rbac-manager

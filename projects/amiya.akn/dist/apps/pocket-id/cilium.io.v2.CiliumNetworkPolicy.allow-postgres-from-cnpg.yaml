---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows CloudNative-PG operator to manage the Pocket ID PostgreSQL database.
      Based on CloudNative-PG networking requirements: operator needs access to
      port 5432 (PostgreSQL) and port 8000 (metrics/management).
  labels:
    app.kubernetes.io/instance: pocket-id
    app.kubernetes.io/name: pocket-id
  name: allow-postgres-from-cnpg
  namespace: pocket-id
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: pocket-id-database
  ingress:
  - fromEndpoints:
    - matchLabels:
        app.kubernetes.io/name: cloudnative-pg
        io.kubernetes.pod.namespace: cloudnative-pg-system
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
      - port: "8000"
        protocol: TCP

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows Pocket ID PostgreSQL pods to access the Kubernetes API server.
  labels:
    app.kubernetes.io/instance: pocket-id
    app.kubernetes.io/name: pocket-id
  name: allow-postgres-to-kubernetes-api
  namespace: pocket-id
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  - toEntities:
    - host
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: pocket-id-database

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: openbao-database
    app.kubernetes.io/name: vault
  name: openbao-database
  namespace: vault
spec:
  bootstrap:
    recovery:
      source: "2026-01-11T08:07:53.126Z"
  description: PostgreSQL database dedicated to OpenBao
  externalClusters:
    - name: "2026-01-11T08:07:53.126Z"
      plugin:
        enabled: true
        isWALArchiver: false
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: selfhosted
          serverName: 01KEP1HV1693BFHSVVNCTQWZ7A
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    major: 17
    name: default
  instances: 1
  managed:
    roles:
      - comment: PostgreSQL role for openbao
        connectionLimit: -1
        ensure: present
        inherit: true
        login: true
        name: openbao
        passwordSecret:
          name: openbao-database-credentials
  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: selfhosted
        serverName: 01KEPSN912SSFFARX3YYZNA22Q
  postgresql:
    parameters:
      max_slot_wal_keep_size: 900MB
      max_wal_size: 100MB
  storage:
    size: 100Mi
  walStorage:
    size: 1Gi

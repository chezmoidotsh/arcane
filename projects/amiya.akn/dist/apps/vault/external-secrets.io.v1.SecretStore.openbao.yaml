---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  labels:
    app.kubernetes.io/name: vault
  name: openbao
  namespace: vault
spec:
  provider:
    kubernetes:
      auth:
        serviceAccount:
          name: eso-openbao-secretstore
          namespace: vault
      remoteNamespace: vault
      server:
        caProvider:
          key: ca.crt
          name: kube-root-ca.crt
          type: ConfigMap
        url: kubernetes.default

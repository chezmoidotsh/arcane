---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows OpenBao PostgreSQL pods to access the Kubernetes API server.
  labels:
    app.kubernetes.io/name: vault
  name: allow-postgres-to-kubernetes-api
  namespace: vault
spec:
  egress:
  - toEntities:
    - kube-apiserver
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: openbao-database

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  name: system
  namespace: argocd
spec:
  clusterResourceBlacklist: []
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  description: |
    This project is responsible for deploying all system applications and configurations inside the targeted cluster,
    depending on existing templates and cluster definitions.
  destinations:
  - name: '*'
    namespace: '*'
    server: '*'
  namespaceResourceBlacklist: []
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  roles: []
  sourceNamespaces:
  - '*'
  sourceRepos:
  - https://github.com/chezmoidotsh/arcane.git
  - https://github.com/chezmoidotsh/vault.kubernetes.git
  - https://charts.external-secrets.io/
  - https://charts.jetstack.io
  - https://github.com/kubernetes-sigs/gateway-api.git
  - https://pkgs.tailscale.com/helmcharts
  - docker.io/envoyproxy

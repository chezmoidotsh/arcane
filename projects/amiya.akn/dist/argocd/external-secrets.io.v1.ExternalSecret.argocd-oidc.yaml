---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/part-of: argocd
  name: argocd-oidc
  namespace: argocd
spec:
  dataFrom:
  - extract:
      key: amiya.akn/argocd/auth/oidc-client
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault.chezmoi.sh
  target:
    name: argocd-oidc
    template:
      data:
        oidc.pocket-id.cliClientID: '{{ .cli_client_id }}'
        oidc.pocket-id.clientID: '{{ .client_id }}'
        oidc.pocket-id.clientSecret: '{{ .client_secret }}'
      engineVersion: v2
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
      type: Opaque

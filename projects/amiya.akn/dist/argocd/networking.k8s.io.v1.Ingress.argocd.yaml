---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    link.argocd.argoproj.io/external-link: https://argocd.tail831c5d.ts.net
  labels:
    tailscale.com/proxy-class: restricted
  name: argocd
  namespace: argocd
spec:
  defaultBackend:
    service:
      name: argocd-server
      port:
        number: 80
  ingressClassName: tailscale
  tls:
  - hosts:
    - argocd

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  name: seed
  namespace: argocd
spec:
  clusterResourceBlacklist: []
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  description: |
    This project is responsible for bootstrapping all clusters automatically when they are added to the ArgoCD
    instance with 2 ApplicationSet, one for system applications and one for regular applications.
  destinations:
  - name: '*'
    namespace: '*'
    server: https://kubernetes.default.svc
  namespaceResourceBlacklist: []
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  roles: []
  sourceNamespaces:
  - argocd
  sourceRepos:
  - https://github.com/chezmoidotsh/arcane.git

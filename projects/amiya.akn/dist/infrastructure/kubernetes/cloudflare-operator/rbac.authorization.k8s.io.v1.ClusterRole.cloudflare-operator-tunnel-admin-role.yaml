---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: cloudflare-operator
  name: cloudflare-operator-tunnel-admin-role
rules:
  - apiGroups:
      - networking.cfargotunnel.com
    resources:
      - tunnels
    verbs:
      - "*"
  - apiGroups:
      - networking.cfargotunnel.com
    resources:
      - tunnels/status
    verbs:
      - get

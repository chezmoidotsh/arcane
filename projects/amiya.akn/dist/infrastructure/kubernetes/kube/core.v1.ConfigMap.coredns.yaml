apiVersion: v1
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        log . {
            class error
        }
        prometheus :9153

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            fallthrough in-addr.arpa ip6.arpa
        }
        forward . /etc/resolv.conf {
            max_concurrent 1000
        }
        cache 30 {
            disable success cluster.local
            disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }

    ts.net:53 {
        errors
        log . {
            class error
        }

        forward . {$MAGIC_DNS_IP} {
            max_concurrent 1000
        }
        cache 30
    }
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system

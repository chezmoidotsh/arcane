---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: restricted
  namespace: tailscale-system
spec:
  statefulSet:
    pod:
      securityContext:
        fsGroup: 25778
        runAsGroup: 25778
        runAsNonRoot: true
        runAsUser: 25778
      tailscaleContainer:
        resources:
          limits:
            memory: 128Mi
            squat.ai/tun: "1"
          requests:
            cpu: 10m
            memory: 32Mi
            squat.ai/tun: "1"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          seccompProfile:
            type: RuntimeDefault

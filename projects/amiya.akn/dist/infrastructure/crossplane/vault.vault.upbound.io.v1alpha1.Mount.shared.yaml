---
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Mount
metadata:
  name: shared
spec:
  deletionPolicy: Orphan
  forProvider:
    description: Shared secrets storage - KV v2 mount for application secrets and
      cross-service configuration accessible by authorized roles
    options:
      version: "2"
    path: shared
    type: kv
  providerConfigRef:
    name: default

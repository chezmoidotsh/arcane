---
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Policy
metadata:
  name: sso-admin-policy
spec:
  forProvider:
    name: sso-admin-policy
    policy: "# This policy defines administrative permissions for Vault operators
      with full access to common operational tasks such \n# as managing secrets engines,
      authentication methods, identities, audit logs, and ACL policies — while explicitly
      denying\n# access to critical operations like sealing, replication control,
      rekeying, and root token handling.\n#\n# WARNING: This policy is intended for
      privileged users who should be able to manage most aspects of Vault without
      the\n#          risk of affecting core availability or security boundaries.\n\n#
      Allow sudo access to all paths (except the ones explicitly denied)\npath \"*\"
      { capabilities = [\"create\", \"read\", \"update\", \"delete\", \"list\"] }\n\n#
      EXPLICITLY LIST ONLY: Personal user secrets (for the authenticated user)\npath
      \"personal/data/*\" { capabilities = [\"list\"] }\npath \"personal/metadata/*\"
      { capabilities = [\"list\"] }\n\n# EXPLICITLY READ ONLY: Plugin catalog (view
      available plugins)\npath \"sys/plugins/catalog/*\" { capabilities = [\"read\",
      \"list\"] }\n\n# EXPLICITLY READ ONLY: Identity management (entities, groups,
      aliases)\npath \"identity/*\" { capabilities = [\"read\", \"list\"] }\n\n# EXPLICITLY
      READ ONLY: License information (optional, read-only)\npath \"sys/license\" {
      capabilities = [\"read\"] }\n\n# EXPLICITLY DENIED: Seal and unseal operations
      (dangerous for HA mode)\npath \"sys/seal\" { capabilities = [\"deny\"] }\npath
      \"sys/unseal\" { capabilities = [\"deny\"] }\n\n# EXPLICITLY DENIED: Replication
      controls (primary/secondary config)\npath \"sys/replication/*\" { capabilities
      = [\"deny\"] }\n\n# EXPLICITLY DENIED: Rekeying Vault (can invalidate access
      to the cluster)\npath \"sys/rekey/*\" { capabilities = [\"deny\"] }\npath \"sys/rotate/*\"
      { capabilities = [\"deny\"] }\n\n# EXPLICITLY DENIED: Root token endpoint\npath
      \"auth/token/root\" { capabilities = [\"deny\"] }\n"

---
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Policy
metadata:
  name: personal-user-access
spec:
  forProvider:
    name: personal-user-access
    policy: "# Personal User Access Policy\n# \n# This templated policy allows users
      to access only their personal namespace within the 'personal' mount.\n# User
      isolation is achieved through templating based on the user's email metadata
      from OIDC authentication.\n#\n# NOTE: The alias ID 'auth_oidc_bac48a4e' is environment-specific
      and generated by OpenBao.\n# To find the correct alias ID for your environment,
      run:\n#   vault auth -method=oidc\n#   vault read -field=id identity/oidc/role/default
      \ # or check entity aliases\n#\n# Templated paths use {{identity.entity.aliases.ALIAS_ID.metadata.email}}
      to ensure each user can only access their own\n# personal space, maintaining
      zero-trust principles while enabling self-service secret management.\n\n# Allow
      user to access their personal secrets (data and metadata)\npath \"personal/data/{{identity.entity.aliases.auth_oidc_bac48a4e.metadata.email}}/\"
      { capabilities = [\"list\"] }\npath \"personal/data/{{identity.entity.aliases.auth_oidc_bac48a4e.metadata.email}}/*\"
      { capabilities = [\"create\", \"read\", \"update\", \"delete\", \"list\"] }\npath
      \"personal/metadata/{{identity.entity.aliases.auth_oidc_bac48a4e.metadata.email}}/*\"
      { capabilities = [\"create\", \"read\", \"update\", \"delete\", \"list\"] }\n\n#
      Allow user to list personal root to discover their own folder\npath \"personal/data/\"
      { capabilities = [\"list\"] }\n\n# Explicit deny for other users' personal spaces\npath
      \"personal/data/*\" { capabilities = [\"deny\"] }\npath \"personal/metadata/*\"
      { capabilities = [\"deny\"] }\n"

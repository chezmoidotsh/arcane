apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  annotations:
    policy.networking.k8s.io/description: |
      Allows OpenBao PostgreSQL pods to access the Kubernetes API server.
  name: allow-postgres-to-kubernetes-api
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: openbao-database
  egress:
    # kube-apiserver entity covers pod IP, host IP, and ClusterIP (10.96.0.1:443)
    # required for recovery pods that connect via the kubernetes service
    - toEntities:
        - kube-apiserver

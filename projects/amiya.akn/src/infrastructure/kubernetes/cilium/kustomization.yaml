---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - default.l2announcementpolicy.yaml
  - primary.ippool.yaml

helmCharts:
  - repo: https://helm.cilium.io/
    name: cilium
    version: 1.18.10

    releaseName: cilium
    namespace: kube-system

    valuesFile: cilium.helmvalues/default.yaml

patches:
  # Helm generates random self-signed certs on every render; Cilium creates and
  # rotates these at runtime so they must not be committed to dist/.
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: cilium-ca
    target:
      kind: Secret
      name: cilium-ca
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: hubble-server-certs
    target:
      kind: Secret
      name: hubble-server-certs

# amiya.akn override — deploy Envoy Proxy data plane resources in each Gateway's namespace
# for stronger isolation between gateways (default gateway vs public-gateway).
# ref: https://gateway.envoyproxy.io/docs/tasks/operations/gateway-namespace-mode/
config:
  envoyGateway:
    provider:
      type: Kubernetes
      kubernetes:
        deploy:
          type: GatewayNamespace

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg-system

helmCharts:
  - repo: https://cloudnative-pg.github.io/charts
    name: cloudnative-pg
    version: 0.28.2

    releaseName: cloudnative-pg
    namespace: cloudnative-pg-system

    valuesFile: cloudnative-pg.helmvalues/default.yaml

resources:
  - # Install Barman Cloud CNPG-I plugin (v0.6.0)
    https://raw.githubusercontent.com/cloudnative-pg/plugin-barman-cloud/e0c8b64470cc31f36b0511b80bbac6ecaa8bd283/manifest.yaml
  - # Configure defaults for CloudNativePG
    ../../../../../../catalog/kubernetes/cloudnative-pg/kustomize

images:
  - name: ghcr.io/cloudnative-pg/cloudnative-pg
    newName: oci.chezmoi.sh/ghcr.io/cloudnative-pg/cloudnative-pg
  - name: ghcr.io/cloudnative-pg/plugin-barman-cloud-testing
    newName: oci.chezmoi.sh/ghcr.io/cloudnative-pg/plugin-barman-cloud-testing

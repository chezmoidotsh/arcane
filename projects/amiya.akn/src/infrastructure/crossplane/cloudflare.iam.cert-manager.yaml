# Cloudflare API Token for cert-manager
#
# Description:
#   This resource creates a Cloudflare API Token with specific permissions for cert-manager
#   to manage DNS records and zones. The token is used by cert-manager to automatically
#   create and manage DNS-01 challenges for Let's Encrypt certificates.
#
# Permissions:
#   Zone scope → Zone Read + DNS Write
#     scoped to zone 2734d7b22cf00222046320ed3187cb94 (chezmoi.sh) only
#
# Security:
#   The connection secret lands in the amiya-akn namespace (same as the Token)
#   and is synchronized to Vault (vault.chezmoi.sh) via the co-located PushSecret.
#
# trunk-ignore-all(checkov/CKV2_K8S_5,trivy/KSV113): this is a policy to allow a specific user to use a specific secrets... so it's fine
---
apiVersion: account.upjet-cloudflare.m.upbound.io/v1alpha1
kind: Token
metadata:
  name: amiyaakn-chezmoi-sh-cert-manager
  namespace: amiya-akn
spec:
  forProvider:
    name: (amiya.akn.chezmoi.sh) - cert-manager
    accountId: 00736631322131f61ce95f2c235143da
    policies:
      - effect: allow
        permissionGroups:
          - id: c8fed203ed3043cba015a93ad1616f1f # Zone Read (Zone)
          - id: 4755a26eedb94da69e1066d98aa820be # DNS Write (Zone)
        resources: '{"com.cloudflare.api.account.zone.2734d7b22cf00222046320ed3187cb94":"*"}'
  writeConnectionSecretToRef:
    name: amiya.akn-cloudflare-token-certmanager
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: amiya.akn-cloudflare-token-certmanager
  namespace: amiya-akn
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: vault.chezmoi.sh
  selector:
    secret:
      name: amiya.akn-cloudflare-token-certmanager
  template:
    metadata:
      annotations:
        description: Cloudflare API Token for cert-manager
        origin: crossplane
        owner: amiya.akn
        renewal-process: |
          Remove the amiyaakn-chezmoi-sh-cert-manager Token then wait ArgoCD to create a new one.
  data:
    - conversionStrategy: None
      match:
        secretKey: attribute.value
        remoteRef:
          remoteKey: shared/data/third-parties/cloudflare/iam/amiya.akn/cert-manager-rw
          property: api_token

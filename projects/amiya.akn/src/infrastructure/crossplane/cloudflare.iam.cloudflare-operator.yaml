# Cloudflare API Token for tunnel operator
#
# Description:
#   This resource creates a Cloudflare API Token with specific permissions for the
#   cloudflare-operator to manage tunnels and DNS records. The token is used by
#   the operator to automatically create and manage Cloudflare tunnels.
#
# Permissions (least-privilege, split by resource type):
#   Account scope → Account Settings Read + Argo Tunnel Write
#     scoped to account 00736631322131f61ce95f2c235143da only
#   Zone scope → DNS Write
#     scoped to zone 2734d7b22cf00222046320ed3187cb94 (chezmoi.sh) only
#
# Security:
#   Two-policy split prevents account-level permission groups from reaching zone
#   resources (and vice versa). The secret is synchronized to Vault (vault.chezmoi.sh)
#   using External Secrets Operator.
---
apiVersion: account.upjet-cloudflare.m.upbound.io/v1alpha1
kind: Token
metadata:
  name: amiyaakn-chezmoi-sh-cloudflare-operator
  namespace: amiya-akn
spec:
  forProvider:
    name: (amiya.akn.chezmoi.sh) - cloudflare-operator
    accountId: 00736631322131f61ce95f2c235143da
    policies:
      - effect: allow
        permissionGroups:
          - id: c1fde68c7bcc44588cbb6ddbc16d6480 # Account Settings Read (Account)
          - id: c07321b023e944ff818fec44d8203567 # Argo Tunnel Write (Account)
        resources: '{"com.cloudflare.api.account.00736631322131f61ce95f2c235143da":"*"}'
      - effect: allow
        permissionGroups:
          - id: 4755a26eedb94da69e1066d98aa820be # DNS Write (Zone)
        resources: '{"com.cloudflare.api.account.zone.2734d7b22cf00222046320ed3187cb94":"*"}'
  writeConnectionSecretToRef:
    name: amiya.akn-cloudflare-token-cloudflare-operator
    namespace: crossplane-secrets
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: amiya.akn-cloudflare-token-cloudflare-operator
  namespace: crossplane-secrets
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: vault.chezmoi.sh
  selector:
    secret:
      name: amiya.akn-cloudflare-token-cloudflare-operator
  template:
    metadata:
      annotations:
        description: Cloudflare API Token for tunnel operator
        origin: crossplane
        owner: amiya.akn
        renewal-process: |
          Remove the amiyaakn-chezmoi-sh-cloudflare-operator Token then wait ArgoCD to create a new one.
  data:
    - conversionStrategy: None
      match:
        secretKey: attribute.value
        remoteRef:
          remoteKey: shared/data/third-parties/cloudflare/iam/amiya.akn/cloudflare-operator
          property: api_token

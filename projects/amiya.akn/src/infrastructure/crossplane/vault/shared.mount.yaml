---
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Mount
metadata:
  name: shared
spec:
  deletionPolicy: Orphan
  # Managed by Pulumi now (projects/amiya.akn/src/infrastructure/pulumi/) — observe
  # only, don't reconcile or delete.
  managementPolicies: ["Observe"]
  forProvider:
    description: Shared secrets storage - KV v2 mount for application secrets and cross-service configuration accessible by authorized roles
    options:
      version: "2"
    path: shared
    type: kv
  providerConfigRef:
    name: default

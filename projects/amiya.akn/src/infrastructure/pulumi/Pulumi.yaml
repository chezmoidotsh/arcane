name: amiya-akn-infra
description: >-
  Cloud + Vault/OpenBao infrastructure for amiya.akn: cluster Vault auth backend
  and mounts, pocket-id JWT auth backend, Cloudflare API tokens, Tailscale OAuth
  clients, Cloudflare rate-limit ruleset.
runtime:
  name: nodejs
  options:
    packagemanager: pnpm

backend:
  # Garage S3 backend. See docs/procedures/infrastructure/
  # INF-20260705-00.pulumi-state-and-import.md.
  url: "s3://pulumi-states?endpoint=s3.chezmoi.sh&region=fr-par-1"

# =============================================================================
# rhodes.akn disaster recovery — Mise configuration
# =============================================================================
# Exposes convenience tasks for the mechanical, low-risk parts of
# openbao.md / pocket-id.md: applying SOPS secrets, finding the latest S3
# backup (delegates to the repo-wide `cnpg:backup:latest` file task —
# .mise/tasks/cnpg/backup/latest, generic across any CNPG cluster, not
# rhodes-specific), and patching a Cluster manifest's recovery source.
#
# Deliberately NOT automated: `kubectl apply` of the patched Cluster manifest,
# or of any other manifest that mutates the cluster. Those stay manual,
# explicit steps in the procedure documents themselves.
# =============================================================================

# -----------------------------------------------------------------------------
# OpenBao Disaster Recovery Tasks
# -----------------------------------------------------------------------------

[tasks."dr:openbao:secrets"]
description = "Apply the vault namespace's SOPS secrets."
usage = '''
arg "<context>" help="Kubernetes context for the target cluster"
complete "context" run="kubectl config get-contexts -o name"
'''
run = '''
kubectl --context "$usage_context" create namespace vault --dry-run=client -o yaml | kubectl --context "$usage_context" apply -f -
kustomize build --enable-alpha-plugins --enable-exec ../../src/apps/vault/sops | kubectl --context "$usage_context" --namespace vault apply -f -
'''

[tasks."dr:openbao:backup:latest"]
description = "Print the latest openbao-database backup serverName on S3."
usage = '''
arg "<context>" help="Kubernetes context for the target cluster"
complete "context" run="kubectl config get-contexts -o name"
'''
depends = [
  { task = "cnpg:backup:latest", args = [
    "{{usage.context}}",
    "vault",
    "projects/rhodes.akn/src/apps/vault/openbao.postgresql-objectstore.yaml",
  ] },
]

[tasks."dr:openbao:patch-recovery"]
description = "Patch openbao.postgresql.yaml's recovery source with a given serverName — does NOT apply."
usage = '''
arg "<server_name>" help="Server name to patch into openbao.postgresql.yaml's recovery source"
'''
depends = [
  { task = "dr:cnpg:patch-recovery-source", args = [
    "../../src/apps/vault/openbao.postgresql.yaml",
    "{{usage.server_name}}",
  ] },
]


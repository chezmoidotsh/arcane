config:
  clusters:
    - url: https://pve-01.pve.chezmoi.sh:8006/api2/json
      token_id: "kubernetes-ccm@pve!ccm"
      token_secret: "" # set via --set config.clusters[0].token_secret
      region: homelab

enabledControllers:
  - cloud-node
  - cloud-node-lifecycle

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists
  - effect: NoSchedule
    key: node.cloudprovider.kubernetes.io/uninitialized
    operator: Exists

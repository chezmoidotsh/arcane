# Fixed dev-only passphrase for Pulumi's default "passphrase" secrets
# provider — not a real secret, it only protects config inside the
# disposable pulumi-poc S3 state (same reasoning as garage-credentials /
# openbao-credentials). Local `pulumi preview` (scripts/preview.sh) and the
# in-cluster operator (stack/stack.yaml) must use the same value: they
# decrypt the same stack config in the same S3-backed state.
apiVersion: v1
kind: Secret
metadata:
  name: pulumi-credentials
  namespace: pulumi-poc
type: Opaque
stringData:
  passphrase: pulumipocpassphrase

# OpenBao dev mode auto-unseals with a well-known root token by design —
# this is not a real secret, it only exists inside the disposable
# pulumi-poc kind cluster.
---
apiVersion: v1
kind: Secret
metadata:
  name: openbao-credentials
  namespace: pulumi-poc
type: Opaque
stringData:
  address: http://openbao.pulumi-poc.svc.cluster.local:8200
  token: root

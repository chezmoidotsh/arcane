[[IgnoredVulns]]
id = "GHSA-8988-4f7v-96qf"
reason = "Transitive dependency pinned by @pulumi/pulumi 3.250.0 itself (@opentelemetry/core 1.30.1). Fixed only in 2.8.0, a breaking major bump incompatible with the rest of the 1.x OpenTelemetry SDK/exporters @pulumi/pulumi depends on — not fixable from this repo. The vulnerable path (unbounded memory parsing W3C Baggage HTTP headers) is unreachable here: this POC configures no OTLP collector endpoint, so Pulumi's telemetry export path never runs."

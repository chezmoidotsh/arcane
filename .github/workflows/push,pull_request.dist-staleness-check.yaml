name: 🏗️ dist/ Staleness Check
on:
  push:
    paths:
      - "projects/*/**"
      - "catalog/helm/**"
  pull_request:
    paths:
      - "projects/*/**"
      - "catalog/helm/**"
  merge_group: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dist-staleness:
    name: ✅ Verify rendered manifests are up to date
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ⬇️ Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 🏗️ Re-render all dist/ directories
        run: scripts/dist:render --all

      - name: 🔍 Fail if any dist/ file is stale
        run: |
          if ! git diff --exit-code -- 'projects/*/dist/**'; then
            echo ""
            echo "::error ::One or more dist/ directories are out of sync with their src/ sources."
            echo "::error ::Run 'scripts/dist:render --all' locally and commit the result."
            exit 1
          fi

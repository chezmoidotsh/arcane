name: 🔍 Raw Kubernetes Validation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/push,pull_request.validation.yaml"
      - "catalog/helm/**"
      - "projects/*/src/apps/**"
      - "projects/*/src/infrastructure/kubernetes/**"

  pull_request:
    paths:
      - ".github/workflows/push,pull_request.validation.yaml"
      - "catalog/helm/**"
      - "projects/*/src/apps/**"
      - "projects/*/src/infrastructure/kubernetes/**"

  merge_group: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dist-staleness:
    name: ✅ Verify rendered manifests are up to date
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ⬇️ Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 🏗️ Re-render all dist/ directories
        run: scripts/dist:render --all

      - name: 🔍 Fail if any dist/ file is stale
        run: |
          if ! git diff --exit-code -- 'projects/*/dist/**'; then
            echo ""
            echo "::error ::One or more dist/ directories are out of sync with their src/ sources."
            echo "::error ::Run 'scripts/dist:render --all' locally and commit the result."
            exit 1
          fi

  detect-changes:
    name: 📂 Detect changed dist/ directories
    needs: dist-staleness
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      directories: ${{ steps.diff.outputs.directories }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔍 Detect changed dist/ directories
        id: diff
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            projects/*/dist/**
          dir_names: true
          dir_names_exclude_root: true
          json: true

  conftest:
    name: 🧪 ${{ matrix.directory }}
    needs: detect-changes
    if: needs.detect-changes.outputs.directories != '[]'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.detect-changes.outputs.directories) }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🛠️ Set up mise
        uses: jdx/mise-action@7a474b166130e0f2b94e03f8e38c25e6801f2f22 # v2.4.4
        with:
          install: true

      - name: 🧪 Run conftest
        run: mise exec conftest -- conftest test "${{ matrix.directory }}" --policy catalog/opa/policies/ --combine --output github

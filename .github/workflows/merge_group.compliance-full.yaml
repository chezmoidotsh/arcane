name: 🏛️ Full Compliance

on:
  merge_group: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  detect-changes:
    name: Detect watched path changes
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.diff.outputs.any_changed }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 🔍 Detect watched path changes
        id: diff
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/merge_group.compliance-full.yaml
            catalog/opa/policies/**
            projects/*/dist/**

  collect-directories:
    name: Collect all dist/ directories
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      directories: ${{ steps.all-dist.outputs.directories }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📋 Collect all dist/ directories
        id: all-dist
        run: |
          dirs=$(find projects -path '*/dist/**' -name '*.yaml' | sed 's|/[^/]*$||' | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "directories=$dirs" >> "$GITHUB_OUTPUT"

  compliance:
    name: ${{ matrix.directory }}
    needs: collect-directories
    if: needs.collect-directories.outputs.directories != '[]'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.collect-directories.outputs.directories) }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ⬇️ Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 🛠️ Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: 🧪 OPA policy check
        run: >-
          mise exec conftest --
          conftest test "${{ matrix.directory }}"
          --policy catalog/opa/policies/
          --combine
          --output github

      - name: 🔍 Zot registry coverage check
        run: >-
          .github/scripts/check-zot-coverage.py
          --dist "${{ matrix.directory }}"

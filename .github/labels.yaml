# ----------------------------------------------------------------------------
# Meta / special
# ----------------------------------------------------------------------------
- name: breaking-change
  description: Introduces a breaking change for users or operators
  color: F0CB2C
- name: good-first-issue
  description: Good entry point for new contributors
  color: 7057FF
- name: help-wanted
  description: Maintainer is actively looking for outside help
  color: 008672
- name: sponsor
  description: Filed by a sponsor
  color: FFDBF0
- name: stale
  description: No recent activity — eligible for auto-close
  color: 6A5ACD
- name: no-stale
  description: Exempt from staleness automation
  color: 6A5ACD

# ----------------------------------------------------------------------------
# Triage close reasons (GitHub-native semantics, kept as-is)
# ----------------------------------------------------------------------------
- name: duplicate
  description: Already tracked by another issue or PR
  color: CFD3D7
- name: invalid
  description: Not actionable as filed
  color: E4E669
- name: wontfix
  description: Will not be addressed (by design or out of scope)
  color: FFFFFF

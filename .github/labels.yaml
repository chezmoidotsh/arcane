# ----------------------------------------------------------------------------
#
# Label taxonomy
# --------------
# Three orthogonal groups, applied independently:
#
#   size::<x>        Effort estimate                  (issues + PRs)
#   priority::<x>    Urgency                          (issues only)
#   <scope>          Where in the repo               (mirrors commit scopes verbatim)
#
# Type and status are now GitHub-native fields:
#   Issue Type       Bug / Feature / Improvement / Task / Docs / Security / Question
#   Status           Triage / In Progress / Blocked / Done  (project field, not label)
#
# Plus a small set of bare meta labels (`stale`, `breaking-change`, …).
#
# Scope labels use a single colon (e.g. `project`, `catalog`, `gh`, `deps`) — the
# `::` separator is reserved for the orthogonal classification groups above.
# `project` and `catalog` are deliberately coarse: which project/catalog area is
# visible from the PR/issue body, not duplicated as a label.
#
# When adding or renaming a label, prefer `gh label edit <old> --name <new>` first
# to preserve issue associations, then update this file to match. The sync workflow
# (`.github/workflows/push,schedule.sync-labels.yaml`) uses `prune: true`, so any
# label not declared here will be deleted on the next sync.
---
# ----------------------------------------------------------------------------
# size:: — effort estimate
# ----------------------------------------------------------------------------
- name: size::XS
  description: Trivial — under one hour of focused work
  color: 0E8A16
- name: size::S
  description: Small — under one day
  color: 47A248
- name: size::M
  description: Medium — one to three days
  color: FBCA04
- name: size::L
  description: Large — three days to one week
  color: F4A261
- name: size::XL
  description: Extra large — more than one week, likely multi-phase
  color: D93F0B

# ----------------------------------------------------------------------------
# priority:: — urgency
# ----------------------------------------------------------------------------
- name: priority::critical
  description: Outage, data loss, or active security incident — drop everything
  color: B60205
- name: priority::high
  description: Important, needs attention this week
  color: D93F0B
- name: priority::medium
  description: Normal scheduled work
  color: FBCA04
- name: priority::low
  description: Nice to have, no time pressure
  color: 0E8A16

# ----------------------------------------------------------------------------
# Scope
# ----------------------------------------------------------------------------
- name: project
  description: Anything under projects/ — which cluster/app is named in the body
  color: 1D76DB
- name: catalog
  description: Anything under catalog/ — which area (ansible, crossplane, …) is named in the body
  color: 8B5CF6
- name: agents:knowledge
  description: Operational knowledge distilled from incidents (.agents/knowledge/)
  color: F9D0C4
- name: agents:sessions
  description: Agent session documents (.agents/sessions/)
  color: F9D0C4
- name: agents:skills
  description: Agent skill definitions (.agents/skills/)
  color: F9D0C4
- name: gh
  description: GitHub workflows, issue/PR templates, root config files, cross-cutting
  color: 6E5494
- name: deps
  description: Dependency updates (automated or manual)
  color: 2B098D

# ----------------------------------------------------------------------------
# Meta / special
# ----------------------------------------------------------------------------
- name: breaking-change
  description: Introduces a breaking change for users or operators
  color: F0CB2C
- name: good-first-issue
  description: Good entry point for new contributors
  color: 7057FF
- name: help-wanted
  description: Maintainer is actively looking for outside help
  color: 008672
- name: sponsor
  description: Filed by a sponsor
  color: FFDBF0
- name: stale
  description: No recent activity — eligible for auto-close
  color: 6A5ACD
- name: no-stale
  description: Exempt from staleness automation
  color: 6A5ACD

# ----------------------------------------------------------------------------
# Triage close reasons (GitHub-native semantics, kept as-is)
# ----------------------------------------------------------------------------
- name: duplicate
  description: Already tracked by another issue or PR
  color: CFD3D7
- name: invalid
  description: Not actionable as filed
  color: E4E669
- name: wontfix
  description: Will not be addressed (by design or out of scope)
  color: FFFFFF

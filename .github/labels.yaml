# ----------------------------------------------------------------------------
#
# Label taxonomy
# --------------
# Four orthogonal groups, applied independently:
#
#   pr::<x>          PR auto-labeler categorization  (PRs only, set by labeler.yml)
#   size::<x>        Effort estimate                  (issues + PRs)
#   priority::<x>    Urgency                          (issues only)
#   <scope>          Where in the repo               (mirrors commit scopes verbatim)
#
# Type and status are now GitHub-native fields:
#   Issue Type       Bug / Feature / Improvement / Task / Docs / Security / Question
#   Status           Triage / In Progress / Blocked / Done  (project field, not label)
#
# Plus a small set of bare meta labels (`stale`, `breaking-change`, …).
#
# Scope labels are the same identifiers used as commit scopes in `.commitlintrc.js`
# (e.g. `project:amiya.akn`, `catalog:crossplane`, `gh`, `deps`). They use a single
# colon — the `::` separator is reserved for the orthogonal classification groups
# above.
#
# When adding or renaming a label, prefer `gh label edit <old> --name <new>` first
# to preserve issue associations, then update this file to match. The sync workflow
# (`.github/workflows/push,schedule.sync-labels.yaml`) uses `prune: true`, so any
# label not declared here will be deleted on the next sync.
---
# ----------------------------------------------------------------------------
# pr:: — PR auto-labeler (consumed by .github/labeler.yml — do not rename)
# ----------------------------------------------------------------------------
- name: pr::bugfix
  description: Something that wasn't working is now fixed
  color: D73A4A
- name: pr::dependencies
  description: Dependencies upgrade
  color: 2B098D
- name: pr::documentation
  description: Improvements or additions to documentation
  color: 0075CA
- name: pr::workflows
  description: Changes on workflows
  color: 6A5ACD
- name: pr::others
  description: Anything else
  color: DEDB26

# ----------------------------------------------------------------------------
# size:: — effort estimate
# ----------------------------------------------------------------------------
- name: size::XS
  description: Trivial — under one hour of focused work
  color: 0E8A16
- name: size::S
  description: Small — under one day
  color: 47A248
- name: size::M
  description: Medium — one to three days
  color: FBCA04
- name: size::L
  description: Large — three days to one week
  color: F4A261
- name: size::XL
  description: Extra large — more than one week, likely multi-phase
  color: D93F0B

# ----------------------------------------------------------------------------
# priority:: — urgency
# ----------------------------------------------------------------------------
- name: priority::critical
  description: Outage, data loss, or active security incident — drop everything
  color: B60205
- name: priority::high
  description: Important, needs attention this week
  color: D93F0B
- name: priority::medium
  description: Normal scheduled work
  color: FBCA04
- name: priority::low
  description: Nice to have, no time pressure
  color: 0E8A16


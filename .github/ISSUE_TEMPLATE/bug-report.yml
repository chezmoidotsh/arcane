name: "Bug Report"
description: Report a bug in the infrastructure
title: "Brief sentence describing what is broken and where"
labels: ["type::bug", "status::triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Title

        A sentence — not a commit format. Lead with the symptom, then where it appears, then user impact. The `type::bug` label and the scope label (`project:lungmen.akn`, `gh`, …) carry classification.

        Examples:
        - `WAL volume full on apps-secured cluster — immich and paperless unavailable`
        - `validate_commits.sh false-positive on '-' type rejects valid commits`

        Don't use:
        - `![scope]: …` — that's the commit format, kept on commits only
        - `🔧(scope): …` — gitmoji + parens, retired

  - type: textarea
    id: tldr
    attributes:
      label: TL;DR
      description: One sentence — what is broken, where, what the user impact is.
      placeholder: "Component fails when condition X, causing impact Y on Z."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Cluster, namespace, app/version, when it started, and any deploy/change that correlates.
      placeholder: |
        - Cluster: lungmen.akn
        - Namespace: immich
        - Started: 2026-05-28 ~02:00 UTC, around the time CNPG cluster `apps-secured` rotated WAL retention
    validations:
      required: true

  - type: textarea
    id: observable
    attributes:
      label: Observable behavior
      description: Symptoms, error messages, status. Be factual. Verbatim error strings beat paraphrasing.
      placeholder: |
        immich-server pod restarts with `ECONNREFUSED 10.43.x.x:5432` every 30s.
        `kubectl get cluster -n databases` shows `apps-secured` in `Cluster in healthy state` despite WAL archiving failure.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands or sequence anyone can run to see the bug. If intermittent, say so and describe trigger conditions.
      placeholder: |
        1. kubectl -n immich get pods
        2. kubectl -n immich logs deploy/immich-server --tail=200
        3. kubectl -n databases get cluster apps-secured -o yaml | yq .status

  - type: textarea
    id: evidence
    attributes:
      label: Evidence (logs, status, config)
      description: Paste actual command output and relevant config. Redact secrets. Wrap shell output in ```shell, YAML in ```yaml.
      render: shell

  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: Service unavailable or degraded for users
        - label: Data integrity at risk (loss, corruption, divergence)
        - label: Security implication (exposure, broken policy, credential leak)
        - label: Deployment or sync blocked

  - type: textarea
    id: investigation
    attributes:
      label: Investigation so far
      description: What has been ruled in or out, what failed to help. Avoids duplicate work for whoever picks this up.
      placeholder: |
        - Verified ExternalSecrets are synced (kubectl get externalsecrets -n immich, all `SecretSynced=True`)
        - Restarted the CNPG primary — same error after restart
        - Suspected WAL volume saturation (90% on `apps-secured-1` PVC)

  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis or known root cause
      description: Best current guess + confidence (low / medium / high). Skip if no signal yet.
      placeholder: |
        Medium confidence — WAL retention not enforced because Barman archiving has been failing
        silently since 2026-05-24 (S3 credentials rotated). Root cause TBD.

  - type: textarea
    id: links
    attributes:
      label: Links and references
      description: Related issues, PRs, post-mortems, dashboards, upstream bug reports.

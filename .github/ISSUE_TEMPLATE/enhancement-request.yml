name: "Enhancement Request"
description: Propose an improvement, new feature, or refactor
title: "Brief sentence describing the outcome"
labels: ["type::improve", "status::triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Title

        A sentence in English. Start with a verb (`Set up …`, `Replace …`, `Reduce …`, `Extract …`). Type and scope live in labels, not in the title.

        After filing, change the default `type::improve` label to the right one if your intent is different:
        - `type::feature` — new capability, service, or initial deployment
        - `type::improve` — better behavior on something that exists (perf, config, UX)
        - `type::refactor` — restructure without observable change
        - `type::docs` — documentation only
        - `type::security` — security hardening
        - `type::chore` — tooling, CI, deps

        Also add a scope label: `project:<cluster>`, `catalog:<area>`, `gh` for cross-cutting, `deps` for dependency work.

        Examples:
        - `Set up cluster observability stack (metrics, logs, alerting)` + `type::feature` + `gh`
        - `Reduce ArgoCD sync churn by tuning reconciliation interval` + `type::improve` + `project:amiya.akn`
        - `Extract shared CNPG backup overlay for cross-cluster reuse` + `type::refactor` + `catalog:kustomize`

  - type: textarea
    id: tldr
    attributes:
      label: TL;DR
      description: One sentence — the outcome you want and the value it brings.
      placeholder: "Deploy [X] on [scope] so that [concrete benefit, ideally measurable]."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context — what exists today and why it falls short
      description: Be concrete. Current state + specific pain points, not generic complaints.
      placeholder: |
        Current state: each cluster relies on `kubectl logs` for debugging. No centralized
        logs, no metrics, no alerting.

        Specific pain points observed:
        - Post-mortem #1013 (WAL volume full) was undetected for 4 days
        - No way to spot disk-pressure trends before they become incidents
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What you want to do. Be specific enough that someone could start building. If you are weighing options, list them with their tradeoffs.
      placeholder: |
        Deploy VictoriaMetrics + VictoriaLogs + Grafana on lungmen.akn, scraped by
        vmagent via ServiceMonitor. Multi-cluster ready: vmagent on amiya/kazimierz
        ships to the central vminsert.

        Alternative considered: Prometheus + Loki — rejected for higher resource cost
        at homelab scale.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable outcomes that signal "done". Check during review and after deploy.
      placeholder: |
        - [ ] Metrics scraped from all `lungmen.akn` namespaces via ServiceMonitor
        - [ ] Logs from all pods queryable in Grafana with sub-second p99
        - [ ] Alert fires on CrashLoopBackOff > 5min and disk > 85%
        - [ ] Cilium policies preserve namespace isolation
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and risks
      description: External services, prerequisite work, breaking impact, migration concerns.
      placeholder: |
        Depends on: Longhorn (PVCs), ExternalSecrets (Grafana admin), Pocket-Id (OIDC for Grafana UI).
        Risk: vmagent footprint on small Talos nodes — needs limits validation in a dry run.
        Migration: greenfield, no existing data to preserve.

  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - "size::XS"
        - "size::S"
        - "size::M"
        - "size::L"
        - "size::XL"

  - type: textarea
    id: links
    attributes:
      label: Links and references
      description: Related issues, ADRs, upstream docs, post-mortems motivating this work.

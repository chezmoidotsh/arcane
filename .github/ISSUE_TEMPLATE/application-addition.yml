name: "Application Addition"
description: Request to add a new application to a cluster
title: "Add <application> on <cluster>"
labels: ["type::feature", "status::triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Title

        Sentence-form: `Add <application> on <cluster>` (or a richer sentence that says what it brings). Type is `type::feature`; scope label is `project:<cluster>`.

        Examples:
        - `Add Forgejo as a self-hosted Git forge on lungmen`
        - `Add Immich for self-hosted photo backup on lungmen`

  - type: input
    id: app
    attributes:
      label: Application name and upstream URL
      placeholder: "Forgejo — https://codeberg.org/forgejo/forgejo"
    validations:
      required: true

  - type: textarea
    id: tldr
    attributes:
      label: TL;DR — why this app, why now
      description: One or two sentences. What does it do, what existing gap does it close?
      placeholder: "Self-hosted Git forge for personal infrastructure repositories — removes dependency on external SaaS for sensitive configs."
    validations:
      required: true

  - type: dropdown
    id: cluster
    attributes:
      label: Target cluster
      options:
        - project:amiya.akn (core platform — auth, secrets, GitOps)
        - project:lungmen.akn (home applications — media, productivity, personal)
        - project:kazimierz.akn (public-access gateway)
        - project:hass (Home Assistant ecosystem)
    validations:
      required: true

  - type: checkboxes
    id: integration
    attributes:
      label: Integration requirements
      options:
        - label: SSO / OIDC via Pocket-Id
        - label: Public exposure via Pangolin / Envoy Gateway
        - label: Tailscale-only access
        - label: Persistent storage (Longhorn PVC)
        - label: PostgreSQL via CloudNative-PG
        - label: S3-compatible object storage
        - label: Custom Cloudflare DNS record
        - label: TLS via cert-manager (DNS-01)
        - label: Secrets from OpenBao via ExternalSecrets

  - type: checkboxes
    id: security
    attributes:
      label: Security posture
      options:
        - label: Handles sensitive data (encryption at rest required)
        - label: Network isolation via Cilium NetworkPolicy (default for new apps)
        - label: Internet-facing — must be hardened
        - label: VPN-only access (Tailscale) — internal-only

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies on other services
      description: Databases, caches, message brokers, external APIs — anything that must exist or be deployed first.
      placeholder: |
        - PostgreSQL (CNPG cluster `apps-secured`)
        - SMTP relay (if email is needed)

  - type: textarea
    id: resources
    attributes:
      label: Resource footprint (CPU / RAM / storage)
      description: Initial estimate from upstream docs. Refine during implementation.
      placeholder: |
        - CPU: 100m → 500m
        - Memory: 256Mi → 1Gi
        - Storage: 20Gi (Longhorn) for repository data

  - type: textarea
    id: notes
    attributes:
      label: Special configuration notes
      description: Non-standard Helm values, ConfigMaps, env vars, startup quirks, known operational gotchas.

  - type: textarea
    id: links
    attributes:
      label: Links and references
      description: Upstream docs, Helm chart, container image, similar deployments elsewhere.

# Source: journald → OTLP-style internal format
#
# Reads the systemd journal for the current boot and maps fields to the
# OTLP-like internal pipeline format.
#
# SemConv validation is intentionally absent — it runs on the o11y side
# (validate_semconv in the o11y Vector pipeline).
#
# Resources and attributes are built as nested objects (e.g. service.name lives
# at resources.service.name, an object path — NOT a flat "service.name" key).
# VictoriaLogs flattens nested JSON to dot-separated field names on ingest, so
# the final queryable fields are identical while the Vector-side representation
# stays idiomatic.
#
# Field mapping (journald → OTLP-style):
#   MESSAGE           → body
#   timestamp         → timestamp                         (RFC3339 string)
#   (generated)       → observed_timestamp                (Vector receive time)
#   _HOSTNAME         → resources.host.name
#   (injected)        → resources.axnic.infra.kind        (source entity category)
#   SYSLOG_IDENTIFIER → resources.service.name            (fallback: _COMM)
#   (generated)       → attributes.log.record.uid         (OTel semconv)
#   (reconstructed)   → attributes.log.record.original    (OTel semconv)
#   attributes.log.source = "journald"
#   PRIORITY          → attributes.syslog.severity.{code,text}
#   SYSLOG_FACILITY   → attributes.syslog.facility.code
#   SYSLOG_MSGID      → attributes.syslog.message_id
#   _PID              → attributes.process.pid            (integer)
#   _SYSTEMD_UNIT     → attributes.systemd.unit
#   _TRANSPORT        → attributes.journald.transport
#                     → attributes.log.iostream           (stdout/stderr only)
#   _COMM             → attributes.process.executable.name

sources:
  in_journald:
    type: journald
    current_boot_only: true

transforms:
  journald_to_semconv:
    type: remap
    inputs:
      - in_journald
    source: |
      # ── Extract all raw journald fields ────────────────────────────────
      _ts_raw    = del(.timestamp) || now()
      _ts_fmt    = if is_string(_ts_raw) {
                     format_timestamp!(parse_timestamp!(_ts_raw, format: "%+"), format: "%+")
                   } else {
                     format_timestamp!(_ts_raw, format: "%+")
                   }
      _message   = string(.message) ?? ""
      _host      = string(._HOSTNAME) ?? get_hostname!()
      _comm      = string(._COMM) ?? null
      _app       = if .SYSLOG_IDENTIFIER != null { .SYSLOG_IDENTIFIER } else if _comm != null { _comm } else { null }
      _pid       = ._PID
      _priority  = .PRIORITY
      _facility  = .SYSLOG_FACILITY
      _unit      = ._SYSTEMD_UNIT
      _transport = ._TRANSPORT
      _msgid     = .SYSLOG_MSGID

      _svc_name = if _app == null || _app == "" { "unknown" } else { to_string!(_app) }
      _pid_str  = if _pid != null { to_string!(_pid) } else { "-" }

      # ── Build attributes object ─────────────────────────────────────────
      # VRL's type checker requires parent paths to be initialized as objects
      # before sub-field assignment. Build each namespace separately and merge.

      # log namespace (always present)
      _log = {}
      _log.record = {}
      _log.record.uid      = uuid_v4()
      _log.record.original = _ts_fmt + " " + _host + " " + _svc_name + "[" + _pid_str + "]: " + _message
      _log.source          = "journald"

      # Severity: journald PRIORITY is numeric 0-7 (emerg…debug).
      # Stored verbatim in attributes for querying, and also mapped to the
      # OTLP-style root field severity_number (severity_text derived in to_vlogs_format).
      _syslog = {}
      _severity_number = null
      if _priority != null {
        p = to_int!(_priority)
        if p >= 0 && p <= 7 {
          _sev = if p == 0 { "emerg" } else if p == 1 { "alert" } else if p == 2 { "crit" } else if p == 3 { "err" } else if p == 4 { "warning" } else if p == 5 { "notice" } else if p == 6 { "info" } else { "debug" }
          _syslog.severity = { "code": p, "text": _sev }
          # Map syslog priority to OTel severity_number.
          # Uses the granular FATAL sub-levels: emerg=FATAL4(24), alert=FATAL3(23),
          # crit=FATAL(21). Derived text matches severity_text_values[number - 1].
          # emerg=FATAL4(24), alert=FATAL3(23), crit=FATAL(21), err=ERROR(17), warning=WARN(13), notice/info=INFO(9), debug=DEBUG(5)
          _severity_number = if p == 0 { 24 } else if p == 1 { 23 } else if p == 2 { 21 } else if p == 3 { 17 } else if p == 4 { 13 } else if p <= 6 { 9 } else { 5 }
        } else {
          _syslog.severity = { "code": p }
        }
      }
      if _facility != null { _syslog.facility   = { "code": to_int!(_facility) } }
      if _msgid    != null { _syslog.message_id = to_string!(_msgid) }

      _process = {}
      if _pid  != null { _process.pid        = to_int!(_pid) }
      if _comm != null { _process.executable = { "name": _comm } }

      _systemd = {}
      if _unit != null { _systemd.unit = to_string!(_unit) }

      _journald = {}
      if _transport != null {
        t = to_string!(_transport)
        _journald.transport = t
        if t == "stdout" || t == "stderr" {
          _log.iostream = t
        }
      }

      _attrs = { "log": _log }
      if !is_empty(_syslog)   { _attrs.syslog   = _syslog   }
      if !is_empty(_process)  { _attrs.process  = _process  }
      if !is_empty(_systemd)  { _attrs.systemd  = _systemd  }
      if !is_empty(_journald) { _attrs.journald = _journald }

      # ── Build clean OTLP-style event ────────────────────────────────────
      . = {
        "body":               _message,
        "timestamp":          _ts_fmt,
        "observed_timestamp": format_timestamp!(now(), format: "%+"),
        "resources": {
          "service": {"name": _svc_name},
          "host":    {"name": _host},
          "axnic":   {"infra": {"kind": "lxc"}}
        },
        "attributes": _attrs
      }
      if _severity_number != null {
        .severity_number = _severity_number
      }

# Unit tests — run with: vector test sources.journald.yaml
tests:
  - name: "journald: full event maps to OTLP-style"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "Started NetworkManager.service"
          _HOSTNAME: "pve-01"
          SYSLOG_IDENTIFIER: "systemd"
          _PID: "1"
          SYSLOG_MSGID: "SERVICE"
          PRIORITY: "6"
          SYSLOG_FACILITY: "3"
          _SYSTEMD_UNIT: "NetworkManager.service"
          _TRANSPORT: "journal"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.body, "Started NetworkManager.service", "body")
              assert_eq!(.resources.host.name, "pve-01", "host.name")
              assert_eq!(.resources.axnic.infra.kind, "lxc", "axnic.infra.kind")
              assert_eq!(.resources.service.name, "systemd", "service.name")
              assert_eq!(.attributes.process.pid, 1, "process.pid is int")
              assert_eq!(.attributes.syslog.message_id, "SERVICE", "syslog.message_id")
              assert_eq!(.attributes.syslog.severity.text, "info", "severity.text")
              assert_eq!(.attributes.syslog.severity.code, 6, "severity.code")
              assert_eq!(.attributes.syslog.facility.code, 3, "facility.code")
              assert_eq!(.attributes.systemd.unit, "NetworkManager.service", "systemd.unit")
              assert_eq!(.attributes.journald.transport, "journal", "transport")
              assert!(.attributes.log.record.uid != null, "uid set")
              assert!(.observed_timestamp != null, "observed_timestamp set")
              true

  - name: "journald: only valid OTLP root fields at output"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "m"
          _HOSTNAME: "h"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              allowed = ["body", "timestamp", "observed_timestamp", "resources", "attributes"]
              extra = filter(keys(.)) -> |_i, k| { !includes(allowed, k) }
              assert_eq!(extra, [], "no extra root fields")
              true

  - name: "journald: observed_timestamp is a valid RFC3339 timestamp"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "test"
          _HOSTNAME: "h"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              obs = string!(.observed_timestamp)
              assert!(parse_timestamp!(obs, format: "%+") != null)
              true

  - name: "journald: log.record.uid is a UUID"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "test"
          _HOSTNAME: "pve-01"
          SYSLOG_IDENTIFIER: "sshd"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              uid = string!(.attributes.log.record.uid)
              assert!(length(uid) == 36, "UUID length is 36")
              assert!(contains(uid, "-"), "UUID contains hyphens")
              true

  - name: "journald: log.record.original reconstructs header"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "Connection accepted"
          _HOSTNAME: "pve-01"
          SYSLOG_IDENTIFIER: "sshd"
          _PID: "9876"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              orig = string!(.attributes.log.record.original)
              assert!(contains(orig, "pve-01"), "hostname in original")
              assert!(contains(orig, "sshd"), "appname in original")
              assert!(contains(orig, "9876"), "pid in original")
              assert!(contains(orig, "Connection accepted"), "message in original")
              true

  - name: "journald: minimal event — missing optional fields produce no extra attrs"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "kernel: oom-kill"
          _HOSTNAME: "pve-02"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.body, "kernel: oom-kill")
              assert_eq!(.resources.host.name, "pve-02")
              assert_eq!(.resources.service.name, "unknown", "no SYSLOG_IDENTIFIER → unknown")
              assert!(is_null(.attributes.process.pid))
              assert!(is_null(.attributes.syslog.message_id))
              assert!(is_null(.attributes.syslog.facility.code))
              assert!(.attributes.log.record.uid != null, "uid always set")
              true

  - name: "journald: log.record.original uses dash placeholder for missing pid"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "kernel panic"
          _HOSTNAME: "pve-01"
          SYSLOG_IDENTIFIER: "kernel"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              orig = string!(.attributes.log.record.original)
              assert!(contains(orig, "kernel[-]:"), "missing pid → -")
              assert!(contains(orig, "kernel panic"))
              true

  - name: "journald: PRIORITY 6 = info → OTel INFO"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "unit started"
          _HOSTNAME: "h"
          PRIORITY: "6"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.attributes.syslog.severity.text, "info")
              assert_eq!(.attributes.syslog.severity.code, 6)
              assert_eq!(.severity_number, 9, "INFO → 9")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: PRIORITY 4 = warning → OTel WARN"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "low memory"
          _HOSTNAME: "h"
          PRIORITY: "4"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.attributes.syslog.severity.text, "warning")
              assert_eq!(.attributes.syslog.severity.code, 4)
              assert_eq!(.severity_number, 13, "WARN → 13")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: PRIORITY 0 (emerg) → FATAL4 (24)"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "system unusable"
          _HOSTNAME: "h"
          PRIORITY: "0"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.severity_number, 24, "emerg → FATAL4 24")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: PRIORITY 1 (alert) → FATAL3 (23)"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "action required"
          _HOSTNAME: "h"
          PRIORITY: "1"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.severity_number, 23, "alert → FATAL3 23")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: PRIORITY 2 (crit) → FATAL (21)"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "critical condition"
          _HOSTNAME: "h"
          PRIORITY: "2"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.severity_number, 21, "crit → FATAL 21")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: PRIORITY 3 (err) → OTel ERROR"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "disk error"
          _HOSTNAME: "h"
          PRIORITY: "3"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.severity_number, 17, "err → ERROR 17")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: PRIORITY 7 (debug) → OTel DEBUG"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "verbose output"
          _HOSTNAME: "h"
          PRIORITY: "7"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.severity_number, 5, "debug → DEBUG 5")
              assert!(is_null(.severity_text), "severity_text derived in to_vlogs_format")
              true

  - name: "journald: no PRIORITY → no severity root fields"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "msg"
          _HOSTNAME: "h"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert!(is_null(.severity_number), "no severity_number without PRIORITY")
              assert!(is_null(.severity_text),   "no severity_text without PRIORITY")
              true

  - name: "journald: stdout transport sets log.iostream"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "output line"
          _HOSTNAME: "h"
          SYSLOG_IDENTIFIER: "myapp"
          _TRANSPORT: "stdout"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.attributes.journald.transport, "stdout")
              assert_eq!(.attributes.log.iostream, "stdout")
              true

  - name: "journald: journal transport does not set log.iostream"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "syslog msg"
          _HOSTNAME: "h"
          _TRANSPORT: "journal"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.attributes.journald.transport, "journal")
              assert!(is_null(.attributes.log.iostream))
              true

  - name: "journald: _COMM used as service.name fallback when SYSLOG_IDENTIFIER absent"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "msg"
          _HOSTNAME: "h"
          _COMM: "bash"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              assert_eq!(.resources.service.name, "bash")
              assert_eq!(.attributes.process.executable.name, "bash")
              true

  - name: "journald: process.pid stored as integer"
    inputs:
      - insert_at: journald_to_semconv
        type: log
        log_fields:
          message: "msg"
          _HOSTNAME: "h"
          _PID: "42"
    outputs:
      - extract_from: journald_to_semconv
        conditions:
          - type: vrl
            source: |
              pid = .attributes.process.pid
              assert!(is_integer(pid), "process.pid is integer")
              assert_eq!(pid, 42)
              true

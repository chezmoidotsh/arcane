{{- /*
pushsecret.yaml
Pushes generated credentials from the local Kubernetes Secret to Vault.
Creates two PushSecret resources per user:
  1. Standard (RW) path: Points to the Read-Write service endpoint.
  2. Read-Only (RO) path: Points to the Read-Only replica service endpoint.
This allows consumers to read directly from Vault and get ready-to-use URIs.
*/ -}}

{{- $root := . -}}
{{- $clusterName := include "mutualized-cnpg-databases.clusterName" . -}}
{{- $prefix := include "mutualized-cnpg-databases.resourcePrefix" . -}}

{{- range .Values.spec.databases -}}
  {{- $db := . -}}
  {{- range .users -}}
    {{- $user := . -}}
    {{- $secretName := include "mutualized-cnpg-databases.userCredentialsName" (dict "prefix" $prefix "db" $db "user" $user) -}}
    {{- $targetCluster := $db.cluster | default $clusterName -}}
    {{- $rwHost := printf "%s-rw.%s.svc" $targetCluster $root.Release.Namespace -}}
    {{- $roHost := printf "%s-ro.%s.svc" $targetCluster $root.Release.Namespace -}}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ include "mutualized-cnpg-databases.userCredentialsName" (dict "prefix" $prefix "db" $db "user" $user) }}
  {{- $labels := include "mutualized-cnpg-databases.defaultLabels" (dict "root" $root "instance" $clusterName) | fromYaml }}
  labels:
    {{- toYaml $labels | nindent 4 }}
    mutualized.cloudnative-pg.io/database: {{ $db.name }}
    mutualized.cloudnative-pg.io/user: {{ $user.name }}
  {{- $annotations := include "mutualized-cnpg-databases.defaultAnnotations" (dict "root" $root) | fromYaml }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ $root.Values.spec.behavior.passwords.pushInterval | default "5m" }}
  secretStoreRefs:
    - kind: {{ include "mutualized-cnpg-databases.userSecretStoreKind" (dict "root" $root "user" $user) }}
      name: {{ include "mutualized-cnpg-databases.userSecretStoreName" (dict "root" $root "user" $user) }}
  selector:
    secret:
      name: {{ $secretName }}
  updatePolicy: Replace
  deletionPolicy: Delete
  template:
    data:
      username: '{{ `{{ .username }}` }}'
      password: '{{ `{{ .password }}` }}'
      host: {{ $rwHost }}
      port: "5432"
      uri: postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ $rwHost }}:5432/{{ $db.name }}
      jdbc-uri: jdbc:postgresql://{{ $rwHost }}:5432/{{ $db.name }}?user={{ `{{ .username }}` }}&password={{ `{{ .password }}` }}
      pgpass: {{ $rwHost }}:5432:{{ $db.name }}:{{ `{{ .username }}` }}:{{ `{{ .password }}` }}
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: password
    - match:
        secretKey: host
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: host
    - match:
        secretKey: port
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: port
    - match:
        secretKey: uri
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: uri
    - match:
        secretKey: jdbc-uri
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: jdbc-uri
    - match:
        secretKey: pgpass
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKey" (dict "db" $db "user" $user) }}
          property: pgpass
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ include "mutualized-cnpg-databases.userCredentialsName" (dict "prefix" $prefix "db" $db "user" $user) }}-readonly
  {{- $labels := include "mutualized-cnpg-databases.defaultLabels" (dict "root" $root "instance" $clusterName) | fromYaml }}
  labels:
    {{- toYaml $labels | nindent 4 }}
    mutualized.cloudnative-pg.io/database: {{ $db.name }}
    mutualized.cloudnative-pg.io/user: {{ $user.name }}
  {{- $annotations := include "mutualized-cnpg-databases.defaultAnnotations" (dict "root" $root) | fromYaml }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ $root.Values.spec.behavior.passwords.pushInterval | default "5m" }}
  secretStoreRefs:
    - kind: {{ include "mutualized-cnpg-databases.userSecretStoreKind" (dict "root" $root "user" $user) }}
      name: {{ include "mutualized-cnpg-databases.userSecretStoreName" (dict "root" $root "user" $user) }}
  selector:
    secret:
      name: {{ $secretName }}
  updatePolicy: Replace
  deletionPolicy: Delete
  template:
    data:
      username: '{{ `{{ .username }}` }}'
      password: '{{ `{{ .password }}` }}'
      host: {{ $roHost }}
      port: "5432"
      uri: postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ $roHost }}:5432/{{ $db.name }}
      jdbc-uri: jdbc:postgresql://{{ $roHost }}:5432/{{ $db.name }}?user={{ `{{ .username }}` }}&password={{ `{{ .password }}` }}
      pgpass: {{ $roHost }}:5432:{{ $db.name }}:{{ `{{ .username }}` }}:{{ `{{ .password }}` }}
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: password
    - match:
        secretKey: host
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: host
    - match:
        secretKey: port
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: port
    - match:
        secretKey: uri
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: uri
    - match:
        secretKey: jdbc-uri
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: jdbc-uri
    - match:
        secretKey: pgpass
        remoteRef:
          remoteKey: {{ include "mutualized-cnpg-databases.userVaultKeyReadonly" (dict "db" $db "user" $user) }}
          property: pgpass
{{ end -}}
{{- end -}}

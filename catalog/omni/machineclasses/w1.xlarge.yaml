---
# w1.xlarge — heavy worker (16 GiB). Databases and costly services.
# lungmen.akn-style footprint (CNPG + Percona + more/heavier apps).
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: w1.xlarge
spec:
  matchlabels: []
  autoprovision:
    providerid: pve.chezmoi.sh
    kernelargs: []
    metavalues: []
    # providerdata is an opaque YAML string handed to the Proxmox provider.
    # The inline comments document *why* each value — they are valid YAML and
    # ignored by the provider's parser.
    providerdata: |
      # MANDATORY. The omni@pve ACL is scoped to /pool/talos; a VM created
      # outside the pool is denied by Proxmox with a 403.
      pool: talos

      # w1 = balanced worker family (vCPU ≈ RAM / 2 GiB). Heavy tier: databases
      # and costly services (lungmen.akn-style — CNPG + Percona + heavier apps).
      sockets: 1
      cores: 8
      memory: 16384

      # Fixed 32 GB on every class for now (root/ephemeral only — Talos system
      # partitions + container images + emptyDir). Persistent data lives on the
      # Proxmox CSI driver, not the node disk. Thin pool is sparse → a ceiling.
      disk_size: 32

      # CEL over the pool's storages. nvme-lvm is the only image-capable storage.
      storage_selector: 'name == "nvme-lvm"'

      # --- Networking (dual-NIC V2 layout, see ADR-014) ---
      # eth0 — VLAN-aware trunk on vmbr1. V2 moves Talos to VLAN 5 (Homelab);
      # V1 used VLAN 2.
      network_bridge: vmbr1
      vlan: 5
      # CRITICAL: disable the Proxmox fwbr firewall layer on eth0. It defaults
      # to enabled and filters L2 broadcast, which breaks Cilium L2 ARP/NDP
      # announcements for the Talos node VIPs.
      network_firewall: false

      # eth1 — second NIC on the shared SDN VNet "talosnet" for east-west
      # cluster traffic. A single VNet serves every Talos cluster because Omni
      # cluster-template patches cannot override a MachineClass's providerdata,
      # so per-cluster VNets would each need their own class set.
      additional_nics:
        - bridge: talosnet
          firewall: false

      # Matches tal01. The provider default (x86-64-v2-AES) is more conservative.
      cpu_type: x86-64-v3

      # NVMe lvmthin tuning: SSD emulation on, TRIM passthrough to keep the thin
      # pool lean, dedicated I/O thread, io_uring async, and no host page-cache
      # (write-back only adds latency on NVMe).
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_aio: io_uring
      disk_cache: none

      # Proxmox VM tags — visible in the UI and usable for filtering.
      # talos/omni are added automatically by the provider; only role and class.
      tags:
        - kubernetes
        - talos
        - worker
        - w1.xlarge

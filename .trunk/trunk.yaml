---
# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - python@3.14.4
    - rust@>=1.94.0
    - go@>=1.26.0
    - node@24.14.0
# This is the section where you override some tools' configurations.
tools:
  definitions:
    - name: prettier
      extra_packages:
        - "@trivago/prettier-plugin-sort-imports"

# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - bandit
    - black
    - codespell
    - eslint
    - isort
    - markdown-table-prettify
    - rome
    - terrascan
    - trunk-toolbox
    - yamllint # yamllint conflicts with prettier
  enabled:
    - dotenv-linter@4.0.0
    - pinact@4.1.0
    - nixpkgs-fmt@1.3.0
    - actionlint@1.7.12
    - biome@2.5.0
    - checkov@3.3.1
    - git-diff-check
    - hadolint@2.14.0
    - markdown-link-check@3.14.2
    - markdownlint@0.49.0
    - osv-scanner@2.4.0
    - oxipng@10.1.1
    - prettier@3.8.4
    - remark-lint@12.0.1
    - renovate@43.233.3
    - ruff@0.15.18
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - sort-package-json@4.0.0
    - svgo@4.0.1
    - trivy@0.71.2
    - taplo@0.10.0
    - trufflehog@3.95.6
    - conftest
  threshold:
    - linters: [checkov, trivy]
      level: none
  ignore:
    - # Architecture SVG diagram cannot be linted by svgo
      linters: [svgo]
      paths:
        - projects/*/assets/architecture.svg
    - # DO NOT SCAN ANY FILES IN THE UNENCRYPTED KVSTORE
      linters: [ALL]
      paths:
        - projects/chezmoi.sh/src/kubevault/kvstore/*
        - projects/chezmoi.sh/src/kubevault/kvstore/**/*
    - # Encrypted files are cannot be linted like shell or yaml files
      linters:
        - shellcheck
        - shfmt
        - prettier
      paths:
        - projects/chezmoi.sh/src/kubevault/**/*
    - # Prettier should not lint/format markdown files (conflict with remark-lint)
      linters: [prettier]
      paths: ["*.md", "**/*.md"]
    - # Prettier should not lint/format JS/JSON/CSS files (conflict with biome)
      linters: [prettier]
      paths: ["*.js", "**/*.js", "*.json", "**/*.json", "*.css", "**/*.css"]
    - # Prettier should not lint/format templated YAML files
      linters: [prettier]
      paths:
        - projects/nx/src/apps/*sso/authelia/configurations/authelia.yaml
        - catalog/helm/**/templates/*.yaml
    - # Ansible modules commonly have imports not at the top due to the way they handle module metadata
      linters: [ruff]
      paths:
        - catalog/ansible/collections/**/*.py
    - # AI agent templates use headings which conflicts with remark-lint expectations
      linters: [remark-lint]
      paths:
        - "**/*.AGENT.md"
    - # dist/ folders contain generated manifests — excluded from all linters except conftest
      linters:
        - nixpkgs-fmt
        - actionlint
        - biome
        - checkov
        - git-diff-check
        - hadolint
        - markdown-link-check
        - markdownlint
        - osv-scanner
        - oxipng
        - prettier
        - remark-lint
        - renovate
        - ruff
        - shellcheck
        - shfmt
        - sort-package-json
        - svgo
        - trivy
        - taplo
        - trufflehog
      paths:
        - "**/dist/**"
    - # conftest validates only rendered manifests in dist/
      linters: [conftest]
      paths:
        - catalog/**
        - defaults/**
        - docs/**
        - .github/**
        - .trunk/**
        - scripts/**
        - projects/*/src/**

  # This is the section where you override some linters' configurations.
  definitions:
    - name: conftest
      files: [yaml]
      commands:
        - output: regex
          run: conftest test "${target}" -p catalog/opa/policies/ --no-color
          read_output_from: stdout
          run_linter_from: workspace
          success_codes: [0, 1, 2]
          parse_regex: 'FAIL - (?P<path>.+?) - \w+ - (?P<message>.+)'
    - name: remark-lint
      extra_packages:
        - remark-preset-lint-consistent
        - remark-preset-lint-recommended
        - remark-frontmatter
        - remark-lint-list-item-indent
        - vfile-reporter-json
        - remark-gfm

actions:
  definitions:
    # Re-render dist/ for any project whose src/ was touched in this commit.
    # Stages the updated dist/ files automatically so the commit is self-consistent.
    - id: dist-render-pre-commit
      description: Re-render dist/ for projects with staged src/ changes
      run: scripts/dist:render --staged-only
      triggers:
        - files:
            - projects/*/src/apps/**
            - projects/*/src/infrastructure/kubernetes/**
            - catalog/helm/**
  enabled:
    - commitlint
    - submodule-init-update
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
    - dist-render-pre-commit
